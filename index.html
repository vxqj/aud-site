<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aud.lol | OG User Vault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* SIGN UP PAGE */
        .signup-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .signup-container.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .signup-box {
            text-align: center;
            background: #050505;
            padding: 48px;
            border: 1px solid #1a1a1a;
            width: 400px;
            border-radius: 20px;
        }

        .signup-box h2 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .signup-box .sub {
            color: #666;
            font-size: 13px;
            margin-bottom: 32px;
        }

        .signup-box input {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            color: #fff;
            padding: 14px 16px;
            font-size: 14px;
            font-family: inherit;
            border-radius: 10px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }

        .signup-box input:focus {
            outline: none;
            border-color: #fff;
        }

        .signup-box button {
            width: 100%;
            background: #fff;
            border: none;
            color: #000;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            margin-top: 8px;
            transition: opacity 0.2s;
        }

        .signup-box button:hover {
            opacity: 0.8;
        }

        .signup-error {
            color: #ff4444;
            font-size: 12px;
            margin-top: 12px;
        }

        /* DASHBOARD */
        .dashboard {
            display: none;
            height: 100vh;
        }

        /* TOP NAV BAR */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 32px;
            border-bottom: 1px solid #1a1a1a;
            background: #000000;
        }

        .logo {
            font-size: 22px;
            font-weight: 500;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #555;
        }

        .nav-icons {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .icon-btn:hover {
            opacity: 0.6;
        }

        .icon-btn img {
            width: 20px;
            height: 20px;
            filter: invert(1);
        }

        /* MAIN LAYOUT */
        .main-layout {
            display: flex;
            height: calc(100vh - 73px);
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: #000000;
            border-right: 1px solid #1a1a1a;
            padding: 24px 0;
        }

        .nav-item {
            padding: 12px 24px;
            color: #888;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 14px;
            font-weight: 450;
            margin: 0 12px;
            border-radius: 10px;
        }

        .nav-item:hover {
            background: #0a0a0a;
            color: #fff;
        }

        .nav-item.active {
            background: #0a0a0a;
            color: #fff;
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            filter: invert(0.5);
            transition: filter 0.2s;
        }

        .nav-item.active .nav-icon,
        .nav-item:hover .nav-icon {
            filter: invert(1);
        }

        /* CONTENT AREA */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 32px 40px;
        }

        .panel {
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* CLAIM SECTION */
        .claim-title {
            font-size: 28px;
            margin-bottom: 24px;
            font-weight: 500;
        }

        .claim-title small {
            font-size: 13px;
            color: #555;
            font-weight: 400;
        }

        .input-group {
            margin: 20px 0;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            max-width: 400px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            color: #fff;
            padding: 14px 16px;
            font-size: 15px;
            font-family: inherit;
            border-radius: 10px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #fff;
        }

        button {
            background: #fff;
            border: none;
            color: #000;
            padding: 12px 28px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }

        .claim-message {
            margin-top: 16px;
            font-size: 13px;
        }

        .claim-message.error {
            color: #ff4444;
        }

        .claim-message.success {
            color: #44ff44;
        }

        /* INVENTORY GRID */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }

        .inventory-item {
            background: #050505;
            border: 1px solid #1a1a1a;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .inventory-item:hover {
            border-color: #333;
            transform: translateY(-2px);
        }

        .inventory-item .username {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .inventory-item .date {
            font-size: 11px;
            color: #555;
        }

        .empty-state {
            color: #333;
            text-align: center;
            padding: 60px;
            border: 1px dashed #1a1a1a;
            border-radius: 16px;
            margin-top: 24px;
            font-size: 13px;
        }

        hr {
            border: none;
            border-top: 1px solid #1a1a1a;
            margin: 24px 0;
        }

        .info-text {
            font-size: 11px;
            color: #444;
            line-height: 1.5;
        }

        /* NOTIFICATION DROPDOWN */
        .notification-dropdown {
            position: absolute;
            top: 70px;
            right: 100px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            width: 280px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 200;
            display: none;
        }

        .notification-dropdown.show {
            display: block;
        }

        .notification-item {
            padding: 12px 16px;
            border-bottom: 1px solid #1a1a1a;
            font-size: 12px;
            color: #ccc;
        }

        .notification-item:last-child {
            border-bottom: none;
        }

        /* SEARCH MODAL */
        .search-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 300;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .search-modal.show {
            visibility: visible;
            opacity: 1;
        }

        .search-box {
            background: #050505;
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            width: 400px;
            padding: 20px;
        }

        .search-box input {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            color: #fff;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 16px;
        }

        .search-result {
            font-size: 13px;
            color: #888;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

<!-- SIGN UP PAGE -->
<div id="signupContainer" class="signup-container">
    <div class="signup-box">
        <h2>aud.lol</h2>
        <div class="sub">secure a premium username</div>
        <input type="email" id="signupEmail" placeholder="Email">
        <input type="password" id="signupPassword" placeholder="Password">
        <button id="signupBtn">Sign Up</button>
        <div id="signupError" class="signup-error"></div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
    <!-- TOP NAV -->
    <div class="top-nav">
        <div class="logo">aud<span>.</span>lol</div>
        <div class="nav-icons">
            <button class="icon-btn" id="searchBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button class="icon-btn" id="notificationsBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
            </button>
            <button class="icon-btn" id="signoutBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </button>
        </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="main-layout">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="nav-item active" data-tab="inventory">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                    <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                </svg>
                <span>INVENTORY</span>
            </div>
            <div class="nav-item" data-tab="claim">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M20 12v8H4v-8"></path>
                    <polyline points="12 2 12 9 15 6 12 2"></polyline>
                </svg>
                <span>CLAIM</span>
            </div>
        </div>

        <!-- CONTENT -->
        <div class="content">
            <!-- INVENTORY PANEL -->
            <div id="inventory" class="panel active">
                <div class="claim-title">INVENTORY <small>// claimed usernames</small></div>
                <div id="inventoryList" class="inventory-grid">
                    <div class="empty-state">⌀ NO USERNAMES CLAIMED YET</div>
                </div>
            </div>

            <!-- CLAIM PANEL -->
            <div id="claim" class="panel">
                <div class="claim-box">
                    <div class="claim-title">CLAIM YOUR <br>UNIQUE USERNAME</div>
                    <div class="input-group">
                        <label>USERNAME</label>
                        <input type="text" id="claimUsername" placeholder="" maxlength="16">
                    </div>
                    <button id="claimBtn">CLAIM</button>
                    <div id="claimMessage" class="claim-message"></div>
                    <hr>
                    <div class="info-text">
                        ⚠️ Once claimed, username is permanently yours.<br>
                        🔥 OG usernames are first come, first served.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- NOTIFICATION DROPDOWN -->
<div id="notificationDropdown" class="notification-dropdown">
    <div id="notificationList"></div>
</div>

<!-- SEARCH MODAL -->
<div id="searchModal" class="search-modal">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search username...">
        <div id="searchResult" class="search-result"></div>
    </div>
</div>

<script>
    // ============ STORAGE KEYS ============
    const USER_KEY = 'aud_user';
    const CLAIMED_KEY = 'aud_claimed';
    const NOTIFICATIONS_KEY = 'aud_notifications';
    
    // ============ GLOBALS ============
    let currentUser = null;
    let claimedUsernames = [];
    let notifications = [];
    
    // ============ LOAD DATA ============
    function loadData() {
        const savedUser = localStorage.getItem(USER_KEY);
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
        }
        
        const savedClaims = localStorage.getItem(CLAIMED_KEY);
        if (savedClaims) {
            claimedUsernames = JSON.parse(savedClaims);
        }
        
        const savedNotifs = localStorage.getItem(NOTIFICATIONS_KEY);
        if (savedNotifs) {
            notifications = JSON.parse(savedNotifs);
        }
        
        updateInventory();
        updateNotifications();
    }
    
    function saveUser() {
        if (currentUser) {
            localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
        }
    }
    
    function saveClaims() {
        localStorage.setItem(CLAIMED_KEY, JSON.stringify(claimedUsernames));
        updateInventory();
    }
    
    function saveNotifications() {
        localStorage.setItem(NOTIFICATIONS_KEY, JSON.stringify(notifications));
        updateNotifications();
    }
    
    function addNotification(message) {
        notifications.unshift({
            message: message,
            time: new Date().toLocaleTimeString(),
            date: new Date().toLocaleDateString()
        });
        // Keep only last 20 notifications
        if (notifications.length > 20) notifications.pop();
        saveNotifications();
    }
    
    // ============ UPDATE UI ============
    function updateInventory() {
        const inventoryDiv = document.getElementById('inventoryList');
        const userClaims = claimedUsernames.filter(c => c.claimedBy === currentUser?.email);
        
        if (userClaims.length === 0) {
            inventoryDiv.innerHTML = '<div class="empty-state">⌀ NO USERNAMES CLAIMED YET</div>';
            return;
        }
        
        inventoryDiv.innerHTML = userClaims.map(item => `
            <div class="inventory-item">
                <div class="username">@${escapeHtml(item.username)}</div>
                <div class="date">${item.date}</div>
            </div>
        `).join('');
    }
    
    function updateNotifications() {
        const notifList = document.getElementById('notificationList');
        if (notifications.length === 0) {
            notifList.innerHTML = '<div class="notification-item">No notifications</div>';
            return;
        }
        notifList.innerHTML = notifications.map(n => `
            <div class="notification-item">📢 ${escapeHtml(n.message)}<br><span style="font-size:9px;color:#555;">${n.date} ${n.time}</span></div>
        `).join('');
    }
    
    // ============ CHECK USERNAME ============
    function isUsernameClaimed(username) {
        return claimedUsernames.some(item => item.username.toLowerCase() === username.toLowerCase());
    }
    
    function claimUsername(username) {
        const normalized = username.toLowerCase().trim();
        
        if (!normalized) {
            showMessage('Enter a username', 'error');
            return false;
        }
        if (normalized.length < 2) {
            showMessage('Username must be at least 2 characters', 'error');
            return false;
        }
        if (normalized.length > 16) {
            showMessage('Username too long (max 16 characters)', 'error');
            return false;
        }
        if (!/^[a-z0-9_]+$/.test(normalized)) {
            showMessage('Only letters, numbers, and underscores allowed', 'error');
            return false;
        }
        if (isUsernameClaimed(normalized)) {
            showMessage('User already claimed', 'error');
            return false;
        }
        
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        
        claimedUsernames.push({
            username: normalized,
            date: dateStr,
            timestamp: now.getTime(),
            claimedBy: currentUser.email
        });
        
        saveClaims();
        
        // Add notification
        addNotification(`You claimed @${normalized}!`);
        
        showMessage(`✓ Successfully claimed @${normalized}!`, 'success');
        document.getElementById('claimUsername').value = '';
        
        setTimeout(() => {
            switchTab('inventory');
        }, 1500);
        
        return true;
    }
    
    function showMessage(msg, type) {
        const msgDiv = document.getElementById('claimMessage');
        msgDiv.textContent = msg;
        msgDiv.className = `claim-message ${type}`;
        setTimeout(() => {
            if (document.getElementById('claimMessage').textContent === msg) {
                msgDiv.textContent = '';
                msgDiv.className = 'claim-message';
            }
        }, 3000);
    }
    
    function searchUsername(username) {
        const searchTerm = username.toLowerCase().trim();
        const found = claimedUsernames.find(c => c.username === searchTerm);
        const resultDiv = document.getElementById('searchResult');
        
        if (found) {
            resultDiv.innerHTML = `<span style="color:#44ff44;">✓ @${found.username} was claimed on ${found.date}</span>`;
        } else {
            resultDiv.innerHTML = `<span style="color:#ff4444;">✗ @${searchTerm} is still available</span>`;
        }
    }
    
    // ============ UI ACTIONS ============
    function switchTab(tabId) {
        document.querySelectorAll('.nav-item').forEach(item => {
            if (item.dataset.tab === tabId) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
        
        document.querySelectorAll('.panel').forEach(panel => {
            if (panel.id === tabId) {
                panel.classList.add('active');
            } else {
                panel.classList.remove('active');
            }
        });
    }
    
    function signOut() {
        localStorage.removeItem(USER_KEY);
        currentUser = null;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('signupContainer').classList.remove('hidden');
        document.getElementById('signupEmail').value = '';
        document.getElementById('signupPassword').value = '';
        document.getElementById('signupError').textContent = '';
    }
    
    // ============ SIGN UP ============
    function signUp() {
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value.trim();
        
        if (!email || !password) {
            document.getElementById('signupError').textContent = 'Enter email and password';
            return;
        }
        
        if (!email.includes('@')) {
            document.getElementById('signupError').textContent = 'Enter a valid email';
            return;
        }
        
        if (password.length < 3) {
            document.getElementById('signupError').textContent = 'Password must be at least 3 characters';
            return;
        }
        
        currentUser = { email: email, password: password };
        saveUser();
        
        document.getElementById('signupContainer').classList.add('hidden');
        document.getElementById('dashboard').style.display = 'block';
        updateInventory();
    }
    
    // ============ EVENT LISTENERS ============
    document.getElementById('signupBtn').addEventListener('click', signUp);
    document.getElementById('signupPassword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') signUp();
    });
    
    document.getElementById('claimBtn').addEventListener('click', () => {
        const username = document.getElementById('claimUsername').value.trim();
        claimUsername(username);
    });
    document.getElementById('claimUsername').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            claimUsername(this.value.trim());
        }
    });
    
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => switchTab(item.dataset.tab));
    });
    
    document.getElementById('signoutBtn').addEventListener('click', signOut);
    
    // Search modal
    const searchModal = document.getElementById('searchModal');
    document.getElementById('searchBtn').addEventListener('click', () => {
        searchModal.classList.add('show');
        document.getElementById('searchInput').value = '';
        document.getElementById('searchResult').innerHTML = '';
        document.getElementById('searchInput').focus();
    });
    searchModal.addEventListener('click', (e) => {
        if (e.target === searchModal) searchModal.classList.remove('show');
    });
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchUsername(this.value);
    });
    
    // Notifications dropdown
    const notifDropdown = document.getElementById('notificationDropdown');
    let notifOpen = false;
    document.getElementById('notificationsBtn').addEventListener('click', () => {
        notifOpen = !notifOpen;
        if (notifOpen) {
            notifDropdown.classList.add('show');
            updateNotifications();
        } else {
            notifDropdown.classList.remove('show');
        }
    });
    document.addEventListener('click', (e) => {
        if (!e.target.closest('#notificationsBtn') && !e.target.closest('.notification-dropdown')) {
            notifDropdown.classList.remove('show');
            notifOpen = false;
        }
    });
    
    // ============ INIT ============
    loadData();
    if (currentUser) {
        document.getElementById('signupContainer').classList.add('hidden');
        document.getElementById('dashboard').style.display = 'block';
    } else {
        document.getElementById('signupContainer').classList.remove('hidden');
        document.getElementById('dashboard').style.display = 'none';
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
</html>
