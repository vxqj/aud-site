<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>n.bio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  font-family: "Courier Prime", "Courier New", monospace;
  color: #fff;
}

/* falling words canvas layer */
#wordfield {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* content */
#content {
  position: fixed;
  top: 36px;
  left: 40px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.site-name {
  font-size: 1.35rem;
  font-weight: 700;
  letter-spacing: -.5px;
  color: #fff;
  margin-bottom: 18px;
  line-height: 1;
}

.meta-label {
  font-size: .78rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
}

.meta-line {
  font-size: .78rem;
  color: #fff;
  margin-bottom: 3px;
  line-height: 1.55;
}

.meta-line.dim {
  color: rgba(255,255,255,.55);
}

.spacer { height: 14px; }

.link-item {
  font-size: .78rem;
  color: rgba(255,255,255,.7);
  text-decoration: underline;
  text-underline-offset: 3px;
  display: block;
  margin-bottom: 4px;
  transition: color .15s;
}
.link-item:hover { color: #fff; }

/* click overlay */
#overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: opacity .6s ease;
}
#overlay.hide {
  opacity: 0;
  pointer-events: none;
}
#overlay-text {
  font-family: "Courier Prime", monospace;
  font-size: .85rem;
  color: rgba(255,255,255,.4);
  letter-spacing: 2px;
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: .4; }
  50%       { opacity: .9; }
}
</style>
</head>
<body>

<canvas id="wordfield"></canvas>

<div id="overlay">
  <span id="overlay-text">click me</span>
</div>

<audio id="audio" loop></audio>

<div id="content">
  <div class="site-name" id="site-name">netloop</div>

  <div class="meta-label" id="last-change-label">last change: <span id="last-change-date">26 April 2026</span></div>
  <div class="spacer"></div>

  <div class="meta-line dim" id="line1">Python / GoLang</div>
  <div class="meta-line dim" id="line2">nothing here is important.</div>
  <div class="meta-line dim" id="line3">if you're reading this, you're early.</div>
  <div class="meta-line" id="discord-line">discord: <span id="discord-val">netloop (355869591278452746)</span></div>

  <div class="spacer"></div>

  <div id="links-container"></div>
</div>

<script>
/* ══════════════════════════
   CONFIG — edit here
══════════════════════════ */
const C = {

  /* ── site info ── */
  siteName:   "aud.lol",           /* shown top-left as the title */
  lastChange: "26 April 2026",   /* date string next to "last change:" */

  /* ── bio lines ── shown as small dim text under the date */
  lines: [
    "Python / GoLang",
    "nothing here is important.",
    "if you're reading this, you're awesome.",
  ],

  /* ── discord ── set to "" to hide */
  discord: "netloop (355869591278452746)",

  /* ── links ── label is what shows, url is where it goes */
  links: [
    { label: "-> tiktok",  url: "https://tiktok.com/@meqe"      },
    { label: "-> discord", url: "https://discord.gg/ydjBdhSJm9" },
  ],

  /* ── background falling words ── */
  bgWords: ["netloop", "net", ":|"],  /* words that fall in the background */
  wordCount: 28,                     /* how many words on screen at once */
  wordSpeed: [1.2, 2.8],             /* [min, max] fall speed in px/frame */
  wordSize:  [10, 32],               /* [min, max] font size in px */
  wordSpin:  0.010,                  /* max rotation speed while falling */
  wordColor: "rgba(150,170,210,",      /* color prefix — opacity is added automatically */

  /* ── music ── paste a direct URL to an mp3/ogg, or set to "" to disable */
  music: {
    url:    "https://files.catbox.moe/jmltcx.mp3",
    volume: 0.4,         /* 0.0 to 1.0 */
  },

};
/* ══════════════════════════ */

/* apply config to DOM */
document.getElementById("site-name").textContent      = C.siteName;
document.getElementById("last-change-date").textContent = C.lastChange;
document.getElementById("discord-val").textContent    = C.discord;

const linesEl = [
  document.getElementById("line1"),
  document.getElementById("line2"),
  document.getElementById("line3"),
];
C.lines.forEach((t, i) => { if (linesEl[i]) linesEl[i].textContent = t; });

const linksEl = document.getElementById("links-container");
C.links.forEach(lk => {
  const a = document.createElement("a");
  a.className = "link-item";
  a.href = lk.url;
  a.target = "_blank";
  a.rel = "noopener";
  a.textContent = lk.label;
  linksEl.appendChild(a);
});

/* ── click overlay + music ── */
const audio = document.getElementById("audio");
const overlay = document.getElementById("overlay");

if (C.music.url) {
  audio.src = C.music.url;
  audio.volume = C.music.volume;
}

overlay.addEventListener("click", () => {
  overlay.classList.add("hide");
  setTimeout(() => overlay.remove(), 700);
  if (C.music.url) audio.play();
});

/* ── falling / drifting words canvas ── */
const canvas = document.getElementById("wordfield");
const ctx    = canvas.getContext("2d");

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", () => { resize(); initWords(); });

const words = [];
function randWord() {
  return C.bgWords[Math.floor(Math.random() * C.bgWords.length)];
}

function lerp(a, b, t) { return a + (b - a) * t; }

function makeWord(spawnAtTop) {
  /* depth: 0 = far/small/dim, 1 = near/large/bright */
  const depth = Math.random();
  const sizeRange  = C.wordSize[1]  - C.wordSize[0];
  const speedRange = C.wordSpeed[1] - C.wordSpeed[0];
  const size  = C.wordSize[0]  + depth * sizeRange;
  const speed = C.wordSpeed[0] + depth * speedRange;
  /* larger = closer = brighter; smaller = further = dimmer */
  const opacity = 0.03 + depth * 0.22;
  return {
    text:    randWord(),
    x:       Math.random() * canvas.width,
    y:       spawnAtTop ? -(size * 2 + Math.random() * 80) : Math.random() * canvas.height,
    size,
    speed,
    depth,
    rot:     (Math.random() - .5) * Math.PI * 2,
    rotSpeed:(Math.random() > .5 ? 1 : -1) * (0.002 + Math.random() * C.wordSpin),
    drift:   (Math.random() - .5) * 0.15,
    opacity,
  };
}

function initWords() {
  words.length = 0;
  for (let i = 0; i < C.wordCount; i++) words.push(makeWord(false));
}
initWords();

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (const w of words) {
    ctx.save();
    ctx.translate(w.x, w.y);
    ctx.rotate(w.rot);
    ctx.font = `400 ${w.size}px "Courier Prime", "Courier New", monospace`;
    ctx.fillStyle = C.wordColor + w.opacity + ")";
    ctx.fillText(w.text, 0, 0);
    ctx.restore();

    w.y   += w.speed;
    w.x   += w.drift;
    w.rot += w.rotSpeed;

    if (w.y > canvas.height + w.size * 3) {
      Object.assign(w, makeWord(true));
      w.x = Math.random() * canvas.width;
    }
  }

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
