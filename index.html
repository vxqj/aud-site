<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>aud.lol</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  font-family: "Courier Prime", "Courier New", monospace;
  color: #fff;
}

#bgvideo {
  display: none;
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 0;
  pointer-events: none;
}

#wordfield {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

#trail {
  position: fixed;
  inset: 0;
  z-index: 5;
  pointer-events: none;
}

#content {
  position: fixed;
  top: 36px;
  left: 40px;
  z-index: 10;
  display: flex;
  flex-direction: column;
}

.site-name {
  font-size: 1.35rem;
  font-weight: 700;
  letter-spacing: -.5px;
  color: #fff;
  margin-bottom: 6px;
  line-height: 1;
  min-height: 1.35rem;
}
.site-name::after {
  content: "|";
  animation: blink .7s step-end infinite;
  margin-left: 1px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.username-row {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 18px;
  line-height: 1;
}

.username {
  font-size: .78rem;
  color: rgba(255,255,255,.45);
  letter-spacing: .5px;
  position: relative;
  cursor: default;
  display: flex;
  align-items: center;
}
.username:hover { color: rgba(255,255,255,.7); }
.username .tip {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  background: rgba(10,10,10,.95);
  border: 1px solid rgba(255,255,255,.2);
  color: #fff;
  font-size: .62rem;
  font-family: "Courier Prime", monospace;
  letter-spacing: 1.5px;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s, transform .15s;
  z-index: 20;
}
.username:hover .tip {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.badge {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  cursor: default;
}
.badge svg {
  width: 14px;
  height: 14px;
  color: #fff;
  transition: transform .15s;
  display: block;
}
.badge:hover svg { transform: scale(1.2); }
.badge .tip {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  background: rgba(10,10,10,.95);
  border: 1px solid rgba(255,255,255,.2);
  color: #fff;
  font-size: .62rem;
  font-family: "Courier Prime", monospace;
  letter-spacing: 1.5px;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s, transform .15s;
  z-index: 20;
}
.badge:hover .tip {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.meta-label {
  font-size: .78rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
}
.meta-line {
  font-size: .78rem;
  color: #fff;
  margin-bottom: 3px;
  line-height: 1.55;
}
.meta-line.dim { color: rgba(255,255,255,.55); }
.spacer { height: 14px; }

.link-item {
  font-size: .78rem;
  color: rgba(255,255,255,.7);
  text-decoration: underline;
  text-underline-offset: 3px;
  display: block;
  margin-bottom: 4px;
  transition: color .15s;
}
.link-item:hover { color: #fff; }

#overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: opacity .6s ease;
}
#overlay.hide { opacity: 0; pointer-events: none; }
#overlay-text {
  font-family: "Courier Prime", monospace;
  font-size: .85rem;
  color: rgba(255,255,255,.4);
  letter-spacing: 2px;
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: .4; }
  50%       { opacity: .9; }
}
</style>
</head>
<body>

<video id="bgvideo" loop playsinline></video>
<canvas id="wordfield"></canvas>
<canvas id="trail"></canvas>

<div id="overlay">
  <span id="overlay-text">click me</span>
</div>

<audio id="audio" loop></audio>

<div id="content">
  <div class="site-name" id="site-name"></div>

  <div class="username-row">
    <span class="username">
      netloop
      <span class="tip">UID: -1</span>
    </span>
    <div class="badge">
      <svg viewBox="0 0 24 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <polygon points="2,18 4,8 9,13 12,2 15,13 20,8 22,18"/>
        <rect x="2" y="18" width="20" height="2" rx="1"/>
      </svg>
      <span class="tip">owner</span>
    </div>
    <div class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H7a3 3 0 00-3 3v3a3 3 0 01-3 3 3 3 0 013 3v3a3 3 0 003 3h1"/>
        <path d="M16 3h1a3 3 0 013 3v3a3 3 0 003 3 3 3 0 00-3 3v3a3 3 0 01-3 3h-1"/>
      </svg>
      <span class="tip">Developer</span>
    </div>
  </div>

  <div class="meta-label">last change: <span id="last-change-date"></span></div>
  <div class="spacer"></div>

  <div class="meta-line dim" id="line1"></div>
  <div class="meta-line dim" id="line2"></div>
  <div class="meta-line dim" id="line3"></div>
  <div class="meta-line" id="discord-line" style="display:none">discord: <span id="discord-val"></span></div>

  <div class="spacer"></div>
  <div id="links-container"></div>
</div>

<script>
/* ══════════════════════════
   CONFIG — edit here
══════════════════════════ */
const C = {

  siteName:   "aud.lol",
  lastChange: "29 April 2026",

  lines: [
    "Python / GoLang",
    "/mlg for marketplace.",
    "join the discord link below for namechecking.",
  ],

  discord: "netloop (355869591278452746)",

  links: [
    { label: "-> tiktok",  url: "https://tiktok.com/@meqe"      },
    { label: "-> discord", url: "https://discord.gg/ydjBdhSJm9" },
  ],

  /* ── video background ──
     add as many mp4 links as you want — a random one plays each page load
     set urls to [] to use falling words instead                           */
  bgVideo: {
    urls: [
      "https://files.catbox.moe/86qpf4.mp4",
      "https://files.catbox.moe/4ep3ya.mp4",
      "https://files.catbox.moe/zxmsp4.mp4",
      "https://files.catbox.moe/j8qzr3.mp4",
      "https://files.catbox.moe/8m4xto.mp4",
      "https://files.catbox.moe/t4qbvb.mp4",
    ],
    opacity: 0.5,
  },

  /* ── falling words (only used if bgVideo.urls is empty) ── */
  bgWords:   ["netloop", "net", "</>"],
  wordCount: 28,
  wordSpeed: [1.2, 2.8],
  wordSize:  [10, 32],
  wordSpin:  0.008,
  wordColor: "rgba(150,170,210,",

  /* ── music ── direct mp3 link, "" = no music ── */
  music: {
    url:    "",
    volume: 0.4,
  },

};
/* ══════════════════════════ */


/* ── apply config to DOM ── */
document.getElementById("last-change-date").textContent = C.lastChange;

["line1","line2","line3"].forEach((id, i) => {
  const el = document.getElementById(id);
  if (el) el.textContent = C.lines[i] || "";
});

if (C.discord) {
  document.getElementById("discord-line").style.display = "";
  document.getElementById("discord-val").textContent = C.discord;
}

C.links.forEach(lk => {
  const a = document.createElement("a");
  a.className = "link-item";
  a.href = lk.url; a.target = "_blank"; a.rel = "noopener";
  a.textContent = lk.label;
  document.getElementById("links-container").appendChild(a);
});


/* ── typewriter ── */
const nameEl   = document.getElementById("site-name");
const typeText = C.siteName;
let ti = 0, deleting = false;

function typeStep() {
  if (!deleting) {
    nameEl.textContent = typeText.slice(0, ++ti);
    if (ti === typeText.length) { deleting = true; setTimeout(typeStep, 1800); }
    else setTimeout(typeStep, 100);
  } else {
    nameEl.textContent = typeText.slice(0, --ti);
    if (ti === 0) { deleting = false; setTimeout(typeStep, 400); }
    else setTimeout(typeStep, 60);
  }
}
setTimeout(typeStep, 500);


/* ── video setup ── */
const bgvideo  = document.getElementById("bgvideo");
const canvas   = document.getElementById("wordfield");
const ctx      = canvas.getContext("2d");
const hasVideo = C.bgVideo.urls && C.bgVideo.urls.length > 0;

if (hasVideo) {
  /* pick a random url from the array */
  const randomUrl = C.bgVideo.urls[Math.floor(Math.random() * C.bgVideo.urls.length)];
  bgvideo.src           = randomUrl;
  bgvideo.style.display = "block";
  bgvideo.style.opacity = C.bgVideo.opacity;
  canvas.style.display  = "none";
}


/* ── overlay click ── */
const audio   = document.getElementById("audio");
const overlay = document.getElementById("overlay");

overlay.addEventListener("click", () => {
  overlay.classList.add("hide");
  setTimeout(() => overlay.remove(), 700);

  if (hasVideo) {
    bgvideo.play().catch(err => console.warn("Video play failed:", err));
  }

  if (C.music.url) {
    audio.src    = C.music.url;
    audio.volume = C.music.volume;
    audio.play().catch(() => {});
  }
});


/* ── falling words ── */
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", () => { resize(); initWords(); });

const words = [];
function randWord() { return C.bgWords[Math.floor(Math.random() * C.bgWords.length)]; }

function makeWord(top) {
  const depth = Math.random();
  const size  = C.wordSize[0]  + depth * (C.wordSize[1]  - C.wordSize[0]);
  const speed = C.wordSpeed[0] + depth * (C.wordSpeed[1] - C.wordSpeed[0]);
  return {
    text: randWord(),
    x: Math.random() * canvas.width,
    y: top ? -(size * 2 + Math.random() * 80) : Math.random() * canvas.height,
    size, speed, depth,
    rot:      (Math.random() - .5) * Math.PI * 2,
    rotSpeed: (Math.random() > .5 ? 1 : -1) * (0.002 + Math.random() * C.wordSpin),
    drift:    (Math.random() - .5) * 0.15,
    opacity:  0.03 + depth * 0.22,
  };
}

function initWords() {
  words.length = 0;
  for (let i = 0; i < C.wordCount; i++) words.push(makeWord(false));
}
initWords();

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const w of words) {
    ctx.save();
    ctx.translate(w.x, w.y);
    ctx.rotate(w.rot);
    ctx.font = `400 ${w.size}px "Courier Prime","Courier New",monospace`;
    ctx.fillStyle = C.wordColor + w.opacity + ")";
    ctx.fillText(w.text, 0, 0);
    ctx.restore();
    w.y += w.speed; w.x += w.drift; w.rot += w.rotSpeed;
    if (w.y > canvas.height + w.size * 3) {
      Object.assign(w, makeWord(true));
      w.x = Math.random() * canvas.width;
    }
  }
  requestAnimationFrame(draw);
}
draw();


/* ── ghost cursor trail ── */
const trail = document.getElementById("trail");
const tCtx  = trail.getContext("2d");
trail.width  = window.innerWidth;
trail.height = window.innerHeight;
window.addEventListener("resize", () => {
  trail.width  = window.innerWidth;
  trail.height = window.innerHeight;
});

let mx = window.innerWidth / 2, my = window.innerHeight / 2;
const ghosts = [
  { x: mx, y: my, lag: 0.18, alpha: 0.25, scale: 0.95 },
  { x: mx, y: my, lag: 0.10, alpha: 0.15, scale: 0.90 },
  { x: mx, y: my, lag: 0.06, alpha: 0.08, scale: 0.85 },
];
window.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; });

function drawArrow(x, y, alpha, scale) {
  tCtx.save();
  tCtx.translate(x, y);
  tCtx.scale(scale, scale);
  tCtx.beginPath();
  tCtx.moveTo(0, 0);
  tCtx.lineTo(0, 16);
  tCtx.lineTo(3.5, 12.5);
  tCtx.lineTo(6, 18);
  tCtx.lineTo(8, 17);
  tCtx.lineTo(5.5, 11.5);
  tCtx.lineTo(10, 11.5);
  tCtx.closePath();
  tCtx.fillStyle = `rgba(255,255,255,${alpha})`;
  tCtx.fill();
  tCtx.strokeStyle = `rgba(0,0,0,${alpha * 0.5})`;
  tCtx.lineWidth = 0.8;
  tCtx.stroke();
  tCtx.restore();
}

function drawTrail() {
  tCtx.clearRect(0, 0, trail.width, trail.height);
  for (const g of ghosts) {
    g.x += (mx - g.x) * g.lag;
    g.y += (my - g.y) * g.lag;
    drawArrow(g.x, g.y, g.alpha, g.scale);
  }
  requestAnimationFrame(drawTrail);
}
drawTrail();
</script>
</body>
</html>
