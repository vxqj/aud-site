<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aud.lol | OG User Vault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Courier New', 'Monaco', monospace;
            height: 100vh;
            overflow: hidden;
        }

        /* PASSCODE GATE */
        .gate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(0px);
            transition: all 0.5s ease;
        }

        .gate-box {
            text-align: center;
            background: #050505;
            padding: 40px;
            border: 1px solid #222;
            width: 350px;
        }

        .gate-box h2 {
            color: #fff;
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: normal;
        }

        .gate-box input {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            font-size: 14px;
            font-family: monospace;
            text-align: center;
            letter-spacing: 2px;
        }

        .gate-box input:focus {
            outline: none;
            border-color: #666;
        }

        .gate-error {
            color: #ff4444;
            font-size: 11px;
            margin-top: 12px;
            letter-spacing: 1px;
        }

        /* DASHBOARD */
        .dashboard {
            display: none;
            height: 100vh;
        }

        .container {
            display: flex;
            height: 100%;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background: #050505;
            border-right: 1px solid #1a1a1a;
            padding: 30px 0;
            display: flex;
            flex-direction: column;
        }

        .logo {
            padding: 0 20px 30px 20px;
            font-size: 20px;
            letter-spacing: -1px;
            border-bottom: 1px solid #1a1a1a;
            margin-bottom: 30px;
        }

        .logo span {
            color: #888;
        }

        .nav-item {
            padding: 14px 20px;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .nav-item:hover {
            background: #0f0f0f;
            color: #fff;
        }

        .nav-item.active {
            background: #0f0f0f;
            color: #fff;
            border-left: 2px solid #fff;
        }

        .nav-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        /* MAIN CONTENT */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        .panel {
            display: none;
            animation: fade 0.2s ease;
        }

        .panel.active {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* CLAIM SECTION */
        .claim-box {
            max-width: 500px;
        }

        .claim-title {
            font-size: 28px;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .claim-title small {
            font-size: 12px;
            color: #555;
        }

        .input-group {
            margin: 20px 0;
        }

        .input-group label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            font-size: 14px;
            font-family: monospace;
        }

        .input-group input:focus {
            outline: none;
            border-color: #fff;
        }

        button {
            background: #fff;
            border: none;
            color: #000;
            padding: 10px 24px;
            font-family: monospace;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #ccc;
        }

        .claim-message {
            margin-top: 15px;
            font-size: 12px;
        }

        .claim-message.error {
            color: #ff4444;
        }

        .claim-message.success {
            color: #44ff44;
        }

        /* INVENTORY */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .inventory-item {
            background: #050505;
            border: 1px solid #1a1a1a;
            padding: 15px;
            text-align: center;
        }

        .inventory-item .username {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .inventory-item .date {
            font-size: 9px;
            color: #555;
            margin-top: 8px;
        }

        .empty-inventory {
            color: #444;
            text-align: center;
            padding: 60px;
            font-size: 12px;
            letter-spacing: 1px;
        }

        /* STATS BAR */
        .stats-bar {
            position: fixed;
            bottom: 0;
            right: 0;
            background: #050505;
            padding: 8px 16px;
            font-size: 10px;
            color: #333;
            border-top: 1px solid #1a1a1a;
            border-left: 1px solid #1a1a1a;
            z-index: 100;
        }

        hr {
            border: none;
            border-top: 1px solid #1a1a1a;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<!-- PASSCODE GATE -->
<div id="gate" class="gate">
    <div class="gate-box">
        <h2>aud.lol</h2>
        <input type="password" id="passcodeInput" placeholder="ENTER PASSCODE" autofocus>
        <div id="gateError" class="gate-error"></div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="logo">aud<span>.</span>lol</div>
            <div class="nav-item active" data-tab="inventory">
                <span class="nav-icon">📦</span>
                <span>INVENTORY</span>
            </div>
            <div class="nav-item" data-tab="claim">
                <span class="nav-icon">🔓</span>
                <span>CLAIM</span>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main">
            <!-- INVENTORY PANEL -->
            <div id="inventory" class="panel active">
                <div class="claim-title">INVENTORY <small>// claimed usernames</small></div>
                <div id="inventoryList" class="inventory-grid">
                    <div class="empty-inventory">⌀ NO USERNAMES CLAIMED YET</div>
                </div>
            </div>

            <!-- CLAIM PANEL -->
            <div id="claim" class="panel">
                <div class="claim-box">
                    <div class="claim-title">CLAIM YOUR NEXT USERNAME</div>
                    <div class="input-group">
                        <label>USERNAME</label>
                        <input type="text" id="claimUsername" placeholder="sin" maxlength="16">
                    </div>
                    <button id="claimBtn">CLAIM</button>
                    <div id="claimMessage" class="claim-message"></div>
                    <hr>
                    <div style="font-size: 11px; color: #444;">
                        ⚠️ Once claimed, username is permanently yours.<br>
                        🔥 OG usernames are first come, first served.
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="stats-bar" id="statsBar">0 USERNAMES CLAIMED</div>
</div>

<script>
    // ============ PASSCODE ============
    const CORRECT_PASSCODE = "ogu2024"; // CHANGE THIS TO YOUR PASSCODE
    
    // ============ STORAGE KEYS ============
    const STORAGE_KEY = 'aud_claimed_usernames';
    
    // ============ GLOBALS ============
    let claimedUsernames = [];
    
    // ============ LOAD SAVED DATA ============
    function loadData() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            claimedUsernames = JSON.parse(saved);
        } else {
            // Default demo data - remove these for production
            claimedUsernames = [];
        }
        updateInventory();
        updateStats();
    }
    
    // ============ SAVE DATA ============
    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(claimedUsernames));
        updateInventory();
        updateStats();
    }
    
    // ============ UPDATE INVENTORY DISPLAY ============
    function updateInventory() {
        const inventoryDiv = document.getElementById('inventoryList');
        
        if (claimedUsernames.length === 0) {
            inventoryDiv.innerHTML = '<div class="empty-inventory">⌀ NO USERNAMES CLAIMED YET</div>';
            return;
        }
        
        // Sort by date claimed (newest first)
        const sorted = [...claimedUsernames].reverse();
        
        inventoryDiv.innerHTML = sorted.map(item => `
            <div class="inventory-item">
                <div class="username">${escapeHtml(item.username)}</div>
                <div class="date">${item.date}</div>
            </div>
        `).join('');
    }
    
    // ============ UPDATE STATS BAR ============
    function updateStats() {
        const statsBar = document.getElementById('statsBar');
        statsBar.textContent = `${claimedUsernames.length} USERNAME${claimedUsernames.length !== 1 ? 'S' : ''} CLAIMED`;
    }
    
    // ============ CHECK IF USERNAME IS CLAIMED ============
    function isUsernameClaimed(username) {
        return claimedUsernames.some(item => item.username.toLowerCase() === username.toLowerCase());
    }
    
    // ============ CLAIM USERNAME ============
    function claimUsername(username) {
        const normalized = username.toLowerCase().trim();
        
        // Validation
        if (!normalized) {
            showMessage('Enter a username', 'error');
            return false;
        }
        
        if (normalized.length < 2) {
            showMessage('Username must be at least 2 characters', 'error');
            return false;
        }
        
        if (normalized.length > 16) {
            showMessage('Username too long (max 16 characters)', 'error');
            return false;
        }
        
        if (!/^[a-z0-9_]+$/.test(normalized)) {
            showMessage('Only letters, numbers, and underscores allowed', 'error');
            return false;
        }
        
        if (isUsernameClaimed(normalized)) {
            showMessage('User already claimed', 'error');
            return false;
        }
        
        // Claim the username
        const now = new Date();
        const dateStr = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        
        claimedUsernames.push({
            username: normalized,
            date: dateStr,
            timestamp: now.getTime()
        });
        
        saveData();
        showMessage(`✓ Successfully claimed @${normalized}!`, 'success');
        
        // Clear input
        document.getElementById('claimUsername').value = '';
        
        // Switch to inventory tab to show new claim
        setTimeout(() => {
            switchTab('inventory');
        }, 1500);
        
        return true;
    }
    
    // ============ SHOW MESSAGE ============
    function showMessage(msg, type) {
        const msgDiv = document.getElementById('claimMessage');
        msgDiv.textContent = msg;
        msgDiv.className = `claim-message ${type}`;
        setTimeout(() => {
            if (document.getElementById('claimMessage').textContent === msg) {
                msgDiv.textContent = '';
                msgDiv.className = 'claim-message';
            }
        }, 3000);
    }
    
    // ============ ESCAPE HTML ============
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ============ TAB SWITCHING ============
    function switchTab(tabId) {
        // Update nav items
        document.querySelectorAll('.nav-item').forEach(item => {
            if (item.dataset.tab === tabId) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
        
        // Update panels
        document.querySelectorAll('.panel').forEach(panel => {
            if (panel.id === tabId) {
                panel.classList.add('active');
            } else {
                panel.classList.remove('active');
            }
        });
    }
    
    // ============ PASSCODE HANDLER ============
    function checkPasscode() {
        const input = document.getElementById('passcodeInput');
        const code = input.value.trim();
        
        if (code === CORRECT_PASSCODE) {
            // Hide gate, show dashboard
            document.getElementById('gate').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadData();
        } else {
            const errorDiv = document.getElementById('gateError');
            errorDiv.textContent = 'INCORRECT PASSCODE';
            input.value = '';
            input.focus();
            setTimeout(() => {
                errorDiv.textContent = '';
            }, 2000);
        }
    }
    
    // ============ EVENT LISTENERS ============
    document.getElementById('passcodeInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkPasscode();
    });
    
    document.getElementById('claimBtn').addEventListener('click', function() {
        const username = document.getElementById('claimUsername').value.trim();
        claimUsername(username);
    });
    
    document.getElementById('claimUsername').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            const username = document.getElementById('claimUsername').value.trim();
            claimUsername(username);
        }
    });
    
    // Tab switching
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function() {
            switchTab(this.dataset.tab);
        });
    });
    
    // Enter key on passcode input focuses it
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('passcodeInput').focus();
    });
</script>

</body>
</html>
