<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>aud.lol</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  font-family: "Courier Prime", "Courier New", monospace;
  color: #fff;
}

#bgvideo {
  display: none;
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 0;
  pointer-events: none;
}

#wordfield {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

#trail {
  position: fixed;
  inset: 0;
  z-index: 5;
  pointer-events: none;
}

/* ── Card Wrapper (positions both cards together) ── */
#card-stack {
  position: fixed;
  top: 36px;
  left: 40px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

/* ── Glass Card ── */
#content {
  position: relative;
  z-index: 10;

  background: rgba(255, 255, 255, 0.04);
  backdrop-filter: blur(18px) saturate(160%);
  -webkit-backdrop-filter: blur(18px) saturate(160%);
  border: 1px solid rgba(255, 255, 255, 0.22);
  border-radius: 20px;
  padding: 22px 26px 20px 26px;
  box-shadow:
    0 8px 40px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.15);

  opacity: 0;
  transform: translateY(-18px) scale(0.97);
  animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  animation-delay: 0.2s;

  display: flex;
  flex-direction: column;
}

@keyframes cardIn {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

#content::before {
  content: "";
  position: absolute;
  top: 0; left: 16px; right: 16px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  border-radius: 999px;
  pointer-events: none;
}

/* ── Arrow toggle button ── */
#roblox-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 20px;
  margin: 6px auto 0 auto;
  cursor: pointer;
  opacity: 0;
  animation: fadeUp 0.5s ease forwards;
  animation-delay: 1.2s;
  align-self: center;
}

#roblox-toggle svg {
  width: 18px;
  height: 18px;
  color: rgba(255,255,255,0.4);
  transition: color 0.2s, transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
}

#roblox-toggle:hover svg {
  color: rgba(255,255,255,0.85);
}

/* ── Roblox Card ── */
#roblox-card {
  position: relative;
  z-index: 9;

  background: rgba(255, 255, 255, 0.04);
  backdrop-filter: blur(18px) saturate(160%);
  -webkit-backdrop-filter: blur(18px) saturate(160%);
  border: 1px solid rgba(255, 255, 255, 0.22);
  border-radius: 20px;
  padding: 0;
  box-shadow:
    0 8px 40px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.15);
  margin-top: 6px;
  overflow: hidden;

  /* match main card width exactly */
  width: 100%;

  /* collapsed by default */
  opacity: 0;
  transform: translateY(-10px) scaleY(0.92);
  transform-origin: top center;
  pointer-events: none;
  transition:
    opacity 0.38s cubic-bezier(0.22, 1, 0.36, 1),
    transform 0.38s cubic-bezier(0.22, 1, 0.36, 1);
}

#roblox-card::before {
  content: "";
  position: absolute;
  top: 0; left: 16px; right: 16px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  border-radius: 999px;
  pointer-events: none;
  z-index: 2;
}

#roblox-card.visible {
  opacity: 1;
  transform: translateY(0) scaleY(1);
  pointer-events: all;
}



/* ── site-name, username-row, meta etc ── */
.site-name {
  font-size: 1.35rem;
  font-weight: 700;
  letter-spacing: -.5px;
  color: #fff;
  margin-bottom: 6px;
  line-height: 1;
  min-height: 1.35rem;
  opacity: 0;
  animation: fadeUp 0.5s ease forwards;
  animation-delay: 0.55s;
}
.site-name::after {
  content: "|";
  animation: blink .7s step-end infinite;
  margin-left: 1px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.username-row {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 18px;
  line-height: 1;
  opacity: 0;
  animation: fadeUp 0.5s ease forwards;
  animation-delay: 0.65s;
}

.username {
  font-size: .78rem;
  color: rgba(255,255,255,.45);
  letter-spacing: .5px;
  position: relative;
  cursor: default;
  display: flex;
  align-items: center;
}
.username:hover { color: rgba(255,255,255,.7); }
.username .tip {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  background: rgba(10,10,10,.95);
  border: 1px solid rgba(255,255,255,.2);
  color: #fff;
  font-size: .62rem;
  font-family: "Courier Prime", monospace;
  letter-spacing: 1.5px;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s, transform .15s;
  z-index: 20;
}
.username:hover .tip { opacity: 1; transform: translateX(-50%) translateY(0); }

.badge {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  cursor: default;
}
.badge svg {
  width: 14px;
  height: 14px;
  color: #fff;
  transition: transform .15s;
  display: block;
}
.badge:hover svg { transform: scale(1.2); }
.badge .tip {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  background: rgba(10,10,10,.95);
  border: 1px solid rgba(255,255,255,.2);
  color: #fff;
  font-size: .62rem;
  font-family: "Courier Prime", monospace;
  letter-spacing: 1.5px;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s, transform .15s;
  z-index: 20;
}
.badge:hover .tip { opacity: 1; transform: translateX(-50%) translateY(0); }

.meta-label {
  font-size: .78rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
  opacity: 0;
  animation: fadeUp 0.5s ease forwards;
  animation-delay: 0.75s;
}
.meta-line {
  font-size: .78rem;
  color: #fff;
  margin-bottom: 3px;
  line-height: 1.55;
  opacity: 0;
  animation: fadeUp 0.5s ease forwards;
}
.meta-line:nth-of-type(1) { animation-delay: 0.82s; }
.meta-line:nth-of-type(2) { animation-delay: 0.89s; }
.meta-line:nth-of-type(3) { animation-delay: 0.96s; }
.meta-line:nth-of-type(4) { animation-delay: 1.03s; }
.meta-line.dim { color: rgba(255,255,255,.55); }
.spacer { height: 14px; }

.icon-links {
  display: flex;
  gap: 14px;
  align-items: center;
  opacity: 0;
  animation: fadeUp 0.5s ease forwards;
  animation-delay: 1.1s;
}
.icon-link {
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,.7);
  transition: color .15s, transform .15s;
  text-decoration: none;
}
.icon-link:hover { color: #fff; transform: scale(1.15); }
.icon-link svg { width: 26px; height: 26px; fill: currentColor; display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Overlay ── */
#overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: opacity .6s ease;
}
#overlay.hide { opacity: 0; pointer-events: none; }
#overlay-text {
  font-family: "Courier Prime", monospace;
  font-size: .85rem;
  color: rgba(255,255,255,.4);
  letter-spacing: 2px;
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: .4; }
  50%       { opacity: .9; }
}
</style>
</head>

/* ── typewriter ── */
const nameEl   = document.getElementById("site-name");
const typeText = C.siteName;
let ti = 0, deleting = false;
function typeStep() {
  if (!deleting) {
    nameEl.textContent = typeText.slice(0, ++ti);
    if (ti === typeText.length) { deleting = true; setTimeout(typeStep, 1800); }
    else setTimeout(typeStep, 100);
  } else {
    nameEl.textContent = typeText.slice(0, --ti);
    if (ti === 0) { deleting = false; setTimeout(typeStep, 400); }
    else setTimeout(typeStep, 60);
  }
}
setTimeout(typeStep, 700);

/* ── video setup ── */
const bgvideo  = document.getElementById("bgvideo");
const canvas   = document.getElementById("wordfield");
const ctx      = canvas.getContext("2d");
const hasVideo = C.bgVideo.urls && C.bgVideo.urls.length > 0;

if (hasVideo) {
  const randomUrl = C.bgVideo.urls[Math.floor(Math.random() * C.bgVideo.urls.length)];
  bgvideo.src           = randomUrl;
  bgvideo.style.display = "block";
  bgvideo.style.opacity = C.bgVideo.opacity;
  canvas.style.display  = "none";
}

/* ── overlay click ── */
const audio   = document.getElementById("audio");
const overlay = document.getElementById("overlay");
overlay.addEventListener("click", () => {
  overlay.classList.add("hide");
  setTimeout(() => overlay.remove(), 700);
  if (hasVideo) bgvideo.play().catch(e => console.warn("Video play failed:", e));
  if (C.music.url) {
    audio.src    = C.music.url;
    audio.volume = C.music.volume;
    audio.play().catch(() => {});
  }
});

/* ── falling words ── */
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener("resize", () => { resize(); initWords(); });

const words = [];
function randWord() { return C.bgWords[Math.floor(Math.random() * C.bgWords.length)]; }
function makeWord(top) {
  const depth = Math.random();
  const size  = C.wordSize[0]  + depth * (C.wordSize[1]  - C.wordSize[0]);
  const speed = C.wordSpeed[0] + depth * (C.wordSpeed[1] - C.wordSpeed[0]);
  return {
    text: randWord(), x: Math.random() * canvas.width,
    y: top ? -(size * 2 + Math.random() * 80) : Math.random() * canvas.height,
    size, speed, depth,
    rot: (Math.random() - .5) * Math.PI * 2,
    rotSpeed: (Math.random() > .5 ? 1 : -1) * (0.002 + Math.random() * C.wordSpin),
    drift: (Math.random() - .5) * 0.15,
    opacity: 0.03 + depth * 0.22,
  };
}
function initWords() { words.length = 0; for (let i = 0; i < C.wordCount; i++) words.push(makeWord(false)); }
initWords();
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const w of words) {
    ctx.save();
    ctx.translate(w.x, w.y);
    ctx.rotate(w.rot);
    ctx.font = `400 ${w.size}px "Courier Prime","Courier New",monospace`;
    ctx.fillStyle = C.wordColor + w.opacity + ")";
    ctx.fillText(w.text, 0, 0);
    ctx.restore();
    w.y += w.speed; w.x += w.drift; w.rot += w.rotSpeed;
    if (w.y > canvas.height + w.size * 3) { Object.assign(w, makeWord(true)); w.x = Math.random() * canvas.width; }
  }
  requestAnimationFrame(draw);
}
draw();

/* ── ghost cursor trail ── */
const trail = document.getElementById("trail");
const tCtx  = trail.getContext("2d");
trail.width  = window.innerWidth;
trail.height = window.innerHeight;
window.addEventListener("resize", () => { trail.width = window.innerWidth; trail.height = window.innerHeight; });
let mx = window.innerWidth / 2, my = window.innerHeight / 2;
const ghosts = [
  { x: mx, y: my, lag: 0.18, alpha: 0.25, scale: 0.95 },
  { x: mx, y: my, lag: 0.10, alpha: 0.15, scale: 0.90 },
  { x: mx, y: my, lag: 0.06, alpha: 0.08, scale: 0.85 },
];
window.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; });
function drawArrow(x, y, alpha, scale) {
  tCtx.save();
  tCtx.translate(x, y);
  tCtx.scale(scale, scale);
  tCtx.beginPath();
  tCtx.moveTo(0, 0); tCtx.lineTo(0, 16); tCtx.lineTo(3.5, 12.5);
  tCtx.lineTo(6, 18); tCtx.lineTo(8, 17); tCtx.lineTo(5.5, 11.5);
  tCtx.lineTo(10, 11.5); tCtx.closePath();
  tCtx.fillStyle = `rgba(255,255,255,${alpha})`;
  tCtx.fill();
  tCtx.strokeStyle = `rgba(0,0,0,${alpha * 0.5})`;
  tCtx.lineWidth = 0.8;
  tCtx.stroke();
  tCtx.restore();
}
function drawTrail() {
  tCtx.clearRect(0, 0, trail.width, trail.height);
  for (const g of ghosts) {
    g.x += (mx - g.x) * g.lag; g.y += (my - g.y) * g.lag;
    drawArrow(g.x, g.y, g.alpha, g.scale);
  }
  requestAnimationFrame(drawTrail);
}
drawTrail();

/* ── Roblox card hover logic ── */
const toggle     = document.getElementById("roblox-toggle");
const robloxCard = document.getElementById("roblox-card");
const toggleSvg  = toggle.querySelector("svg");

let hideTimer   = null;
let cardVisible = false;

function showRobloxCard() {
  clearTimeout(hideTimer);
  if (!cardVisible) {
    cardVisible = true;
    robloxCard.classList.add("visible");
    toggleSvg.style.transform = "rotate(180deg)";
    toggleSvg.style.color = "rgba(255,255,255,0.7)";
  }
}

function scheduleHide() {
  hideTimer = setTimeout(() => {
    cardVisible = false;
    robloxCard.classList.remove("visible");
    toggleSvg.style.transform = "rotate(0deg)";
    toggleSvg.style.color = "rgba(255,255,255,0.4)";
  }, 120);
}

toggle.addEventListener("mouseenter", showRobloxCard);
toggle.addEventListener("mouseleave", scheduleHide);
robloxCard.addEventListener("mouseenter", () => { clearTimeout(hideTimer); });
robloxCard.addEventListener("mouseleave", scheduleHide);
</script>
