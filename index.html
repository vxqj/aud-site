<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aud.lol | OSINT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Courier New', 'Monaco', monospace;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: -1px;
        }
        .logo small {
            font-size: 12px;
            color: #888;
            letter-spacing: 0;
        }
        .tagline {
            color: #888;
            font-size: 12px;
        }

        /* Navigation */
        .nav {
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
            display: flex;
            gap: 0;
        }
        .nav-btn {
            background: none;
            border: none;
            color: #888;
            font-family: monospace;
            font-size: 14px;
            padding: 10px 20px;
            cursor: pointer;
            transition: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }
        .nav-btn:hover {
            color: #fff;
            background: #111;
        }
        .nav-btn.active {
            color: #fff;
            border-bottom-color: #fff;
        }

        /* Panels */
        .panel {
            display: none;
            animation: fade 0.15s ease;
        }
        .panel.active {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Inputs */
        .input-group {
            margin: 20px 0;
        }
        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 8px;
        }
        input, textarea {
            width: 100%;
            max-width: 500px;
            background: #0a0a0a;
            border: 1px solid #333;
            color: #fff;
            padding: 10px 12px;
            font-family: monospace;
            font-size: 14px;
            border-radius: 0px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #fff;
        }
        button {
            background: #fff;
            border: none;
            color: #000;
            padding: 8px 20px;
            font-family: monospace;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0px;
            margin-top: 10px;
        }
        button:hover {
            background: #ccc;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Result card - sharp edges, monochrome */
        .result {
            margin-top: 30px;
            border: 1px solid #333;
            padding: 20px;
            background: #050505;
            font-size: 13px;
            overflow-x: auto;
        }
        .result h3 {
            font-size: 14px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }
        .result pre {
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
            color: #ddd;
        }
        .result .error {
            color: #ff4444;
        }
        hr {
            border: none;
            border-top: 1px solid #222;
            margin: 20px 0;
        }

        /* Footer */
        .footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid #222;
            font-size: 11px;
            color: #444;
            text-align: center;
        }

        /* Utilities */
        .flex {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: flex-start;
        }
        .badge {
            background: #111;
            padding: 4px 8px;
            font-size: 10px;
            border: 1px solid #333;
            font-family: monospace;
        }
        a {
            color: #fff;
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 2px;
        }
        a:hover {
            color: #aaa;
        }
        @media (max-width: 700px) {
            .container { padding: 20px; }
            .header { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">aud.lol<span style="color:#888;"><small> /// OSINT SUITE</small></span></div>
        <div class="tagline">discord · breaches · email · username · ip</div>
    </div>

    <div class="nav">
        <button class="nav-btn active" data-tab="discord">DISCORD</button>
        <button class="nav-btn" data-tab="breach">BREACHES</button>
        <button class="nav-btn" data-tab="email">EMAIL OSINT</button>
        <button class="nav-btn" data-tab="username">USERNAME</button>
        <button class="nav-btn" data-tab="ip">IP GEOLOCATION</button>
    </div>

    <!-- DISCORD PANEL -->
    <div id="discord" class="panel active">
        <div class="input-group">
            <label>DISCORD USER ID</label>
            <input type="text" id="discordId" placeholder="123456789012345678">
            <button id="discordBtn">LOOKUP</button>
        </div>
        <div id="discordResult" class="result"></div>
    </div>

    <!-- BREACH PANEL -->
    <div id="breach" class="panel">
        <div class="input-group">
            <label>EMAIL ADDRESS</label>
            <input type="email" id="breachEmail" placeholder="user@example.com">
            <button id="breachBtn">CHECK BREACHES</button>
        </div>
        <div id="breachResult" class="result"></div>
    </div>

    <!-- EMAIL OSINT PANEL -->
    <div id="email" class="panel">
        <div class="input-group">
            <label>EMAIL ADDRESS</label>
            <input type="email" id="osintEmail" placeholder="target@example.com">
            <button id="emailBtn">FULL OSINT</button>
        </div>
        <div id="emailResult" class="result"></div>
    </div>

    <!-- USERNAME PANEL -->
    <div id="username" class="panel">
        <div class="input-group">
            <label>USERNAME</label>
            <input type="text" id="usernameInput" placeholder="username">
            <button id="usernameBtn">SCAN 50+ PLATFORMS</button>
        </div>
        <div id="usernameResult" class="result"></div>
    </div>

    <!-- IP PANEL -->
    <div id="ip" class="panel">
        <div class="input-group">
            <label>IP ADDRESS (IPv4)</label>
            <input type="text" id="ipInput" placeholder="8.8.8.8">
            <button id="ipBtn">GEOLOCATE</button>
        </div>
        <div id="ipResult" class="result"></div>
    </div>

    <div class="footer">
        aud.lol — osint tools · data from public sources · no warranty
    </div>
</div>

<script>
    // ---------- TAB SWITCHING ----------
    const tabs = document.querySelectorAll('.nav-btn');
    const panels = document.querySelectorAll('.panel');
    tabs.forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.getAttribute('data-tab');
            panels.forEach(p => p.classList.remove('active'));
            tabs.forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        });
    });

    // ---------- API ENDPOINT (REPLACE WITH YOUR BACKEND URL) ----------
    const API_BASE = 'https://your-backend.onrender.com/api';  // <-- CHANGE THIS

    // Helper
    async function callAPI(endpoint, elementId, renderFn) {
        const resultDiv = document.getElementById(elementId);
        resultDiv.innerHTML = '<div style="color:#888;">[ loading... ]</div>';
        try {
            const response = await fetch(`${API_BASE}${endpoint}`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            renderFn(data, resultDiv);
        } catch (err) {
            resultDiv.innerHTML = `<div class="error">[ ERROR ] ${err.message}<br><br>Make sure backend API is running at ${API_BASE}</div>`;
        }
    }

    // Discord render
    function renderDiscord(data, container) {
        if (data.error) {
            container.innerHTML = `<div class="error">${data.error}</div>`;
            return;
        }
        container.innerHTML = `
            <h3>DISCORD USER</h3>
            <div class="flex">
                <div><strong>ID</strong><br>${data.id || '?'}</div>
                <div><strong>USERNAME</strong><br>${data.username || '?'}${data.discriminator ? '#'+data.discriminator : ''}</div>
                <div><strong>CREATED</strong><br>${data.created_at || '?'}</div>
                ${data.bio ? `<div><strong>BIO</strong><br>${data.bio.substring(0, 200)}</div>` : ''}
            </div>
            ${data.avatar_url ? `<hr><img src="${data.avatar_url}" style="max-width:80px; border:1px solid #333;" alt="avatar">` : ''}
        `;
    }

    // Breach render
    function renderBreach(data, container) {
        if (data.error) {
            container.innerHTML = `<div class="error">${data.error}</div>`;
            return;
        }
        if (!data.breaches || data.breaches.length === 0) {
            container.innerHTML = `<h3>NO KNOWN BREACHES</h3><div>This email appears in no public data breaches (good).</div>`;
            return;
        }
        let html = `<h3>${data.breaches.length} BREACH${data.breaches.length !== 1 ? 'ES' : ''} FOUND</h3>`;
        data.breaches.forEach(b => {
            html += `<div style="margin-bottom:16px; border-left:2px solid #333; padding-left:12px;">
                        <strong>${b.Name || b.name || '?'}</strong> — ${b.BreachDate || b.breachDate || 'date unknown'}<br>
                        <span style="color:#aaa;">${(b.DataClasses || b.dataClasses || []).join(', ')}</span>
                     </div>`;
        });
        container.innerHTML = html;
    }

    // Email OSINT render
    function renderEmail(data, container) {
        if (data.error) {
            container.innerHTML = `<div class="error">${data.error}</div>`;
            return;
        }
        container.innerHTML = `
            <h3>EMAIL OSINT</h3>
            <div><strong>EMAIL</strong> ${data.email}</div>
            <div><strong>BREACH COUNT</strong> ${data.breach_count || 0}</div>
            <div><strong>SOCIAL PROFILES</strong> ${data.socials?.length || 0}</div>
            ${data.socials && data.socials.length ? '<hr><div>' + data.socials.map(s => `<a href="${s.url}" target="_blank">${s.platform}</a>`).join(' · ') + '</div>' : ''}
        `;
    }

    // Username render
    function renderUsername(data, container) {
        if (data.error) {
            container.innerHTML = `<div class="error">${data.error}</div>`;
            return;
        }
        const found = (data.profiles || []).filter(p => p.exists);
        container.innerHTML = `<h3>USERNAME: ${data.username || '?'}</h3>
            <div><strong>FOUND ON ${found.length}/${data.total || 0} PLATFORMS</strong></div>
            <div style="margin-top:16px; display:flex; flex-wrap:wrap; gap:8px;">${found.map(p => `<a href="${p.url}" target="_blank" class="badge">${p.name}</a>`).join('')}</div>`;
    }

    // IP render
    function renderIP(data, container) {
        if (data.error || data.status === 'fail') {
            container.innerHTML = `<div class="error">${data.message || 'Invalid IP or lookup failed'}</div>`;
            return;
        }
        container.innerHTML = `
            <h3>IP GEOLOCATION</h3>
            <div class="flex">
                <div><strong>IP</strong><br>${data.ip || '?'}</div>
                <div><strong>LOCATION</strong><br>${data.city || '?'}, ${data.regionName || '?'}, ${data.country || '?'}</div>
                <div><strong>ISP</strong><br>${data.org || data.isp || '?'}</div>
                <div><strong>COORDINATES</strong><br>${data.lat || '?'}, ${data.lon || '?'}</div>
                <div><strong>TIMEZONE</strong><br>${data.timezone || '?'}</div>
            </div>
        `;
    }

    // Bind buttons
    document.getElementById('discordBtn').onclick = () => {
        const id = document.getElementById('discordId').value.trim();
        if (!id) return;
        callAPI(`/discord/${id}`, 'discordResult', renderDiscord);
    };
    document.getElementById('breachBtn').onclick = () => {
        const email = document.getElementById('breachEmail').value.trim();
        if (!email) return;
        callAPI(`/breach/${email}`, 'breachResult', renderBreach);
    };
    document.getElementById('emailBtn').onclick = () => {
        const email = document.getElementById('osintEmail').value.trim();
        if (!email) return;
        callAPI(`/email-osint/${email}`, 'emailResult', renderEmail);
    };
    document.getElementById('usernameBtn').onclick = () => {
        const user = document.getElementById('usernameInput').value.trim();
        if (!user) return;
        callAPI(`/username/${user}`, 'usernameResult', renderUsername);
    };
    document.getElementById('ipBtn').onclick = () => {
        const ip = document.getElementById('ipInput').value.trim();
        if (!ip) return;
        callAPI(`/ip/${ip}`, 'ipResult', renderIP);
    };
</script>
</body>
</html>
