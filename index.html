<script>
    // ============ MOUSE-REACTIVE CANVAS BACKGROUND ============
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let particles = [];
    let particleCount = 120;
    let mouseX = -1000, mouseY = -1000;
    
    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });
    
    class Particle {
        constructor() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.originalX = this.x;
            this.originalY = this.y;
            this.size = Math.random() * 2.5 + 0.8;
            this.baseOpacity = Math.random() * 0.4 + 0.1;
            this.speedX = (Math.random() - 0.5) * 0.2;
            this.speedY = (Math.random() - 0.5) * 0.2;
        }
        
        update() {
            const dx = this.x - mouseX;
            const dy = this.y - mouseY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance < 150) {
                const angle = Math.atan2(dy, dx);
                const force = (150 - distance) / 150 * 3;
                this.x += Math.cos(angle) * force;
                this.y += Math.sin(angle) * force;
            } else {
                this.x += (this.originalX - this.x) * 0.02;
                this.y += (this.originalY - this.y) * 0.02;
            }
            
            this.x += this.speedX;
            this.y += this.speedY;
            
            if (this.x < -50) this.x = width + 50;
            if (this.x > width + 50) this.x = -50;
            if (this.y < -50) this.y = height + 50;
            if (this.y > height + 50) this.y = -50;
            
            if (Math.abs(this.x - this.originalX) > 200) {
                this.originalX = this.x;
                this.originalY = this.y;
            }
        }
        
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            
            const dx = this.x - mouseX;
            const dy = this.y - mouseY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            let opacity = this.baseOpacity;
            if (distance < 100) {
                opacity = 0.8;
            }
            
            ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
            ctx.fill();
        }
    }
    
    function initCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        
        particles = [];
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
    }
    
    function animateCanvas() {
        ctx.clearRect(0, 0, width, height);
        
        const gradient = ctx.createLinearGradient(0, 0, width, height);
        gradient.addColorStop(0, '#0a0a0a');
        gradient.addColorStop(0.5, '#050505');
        gradient.addColorStop(1, '#000000');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);
        
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 100) {
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${0.06 * (1 - distance / 100)})`;
                    ctx.stroke();
                }
            }
        }
        
        for (let particle of particles) {
            particle.update();
            particle.draw();
        }
        
        requestAnimationFrame(animateCanvas);
    }
    
    window.addEventListener('resize', () => {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        particles = [];
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
    });
    
    initCanvas();
    animateCanvas();
    
    // ============ TAB SWITCHING ============
    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            if (btn.dataset.tab === tabId) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        document.querySelectorAll('.panel').forEach(panel => {
            if (panel.id === `${tabId}Panel`) {
                panel.classList.add('active');
            } else {
                panel.classList.remove('active');
            }
        });
    }
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });
    
    // ============ ROBLOX LOOKUP (FIXED) ============
    async function lookupRoblox() {
        const input = document.getElementById('robloxUsername').value.trim();
        const resultDiv = document.getElementById('robloxResult');
        
        if (!input) {
            resultDiv.innerHTML = '<p class="error">enter a Roblox username or user ID</p>';
            return;
        }
        
        resultDiv.innerHTML = '<p>looking up...</p>';
        
        try {
            let userId = input;
            
            // Check if input is numeric (user ID)
            const isNumeric = /^\d+$/.test(input);
            
            if (!isNumeric) {
                // Username resolution via API
                const usernameRes = await fetch('https://users.roblox.com/v1/usernames/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usernames: [input] })
                });
                const usernameData = await usernameRes.json();
                
                if (!usernameData.data || usernameData.data.length === 0) {
                    resultDiv.innerHTML = '<p class="error">username not found</p>';
                    return;
                }
                userId = usernameData.data[0].id;
            }
            
            // Get user profile
            const profileRes = await fetch(`https://users.roblox.com/v1/users/${userId}`);
            const profile = await profileRes.json();
            
            if (!profile || profile.errors || !profile.id) {
                resultDiv.innerHTML = '<p class="error">user not found</p>';
                return;
            }
            
            // Get follower count
            let followers = 0;
            try {
                const followersRes = await fetch(`https://friends.roblox.com/v1/users/${userId}/followers/count`);
                const followersData = await followersRes.json();
                followers = followersData.count || 0;
            } catch(e) { followers = 0; }
            
            // Get following count
            let following = 0;
            try {
                const followingRes = await fetch(`https://friends.roblox.com/v1/users/${userId}/followings/count`);
                const followingData = await followingRes.json();
                following = followingData.count || 0;
            } catch(e) { following = 0; }
            
            // Get friend count
            let friends = 0;
            try {
                const friendsRes = await fetch(`https://friends.roblox.com/v1/users/${userId}/friends/count`);
                const friendsData = await friendsRes.json();
                friends = friendsData.count || 0;
            } catch(e) { friends = 0; }
            
            // Get presence status (online/offline)
            let presence = 'Unknown';
            let lastOnline = '';
            try {
                const presenceRes = await fetch('https://presence.roblox.com/v1/presence/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userIds: [parseInt(userId)] })
                });
                const presenceData = await presenceRes.json();
                if (presenceData.userPresences && presenceData.userPresences[0]) {
                    const status = presenceData.userPresences[0].userPresenceType;
                    if (status === 1) presence = 'Online';
                    else if (status === 2) presence = 'In Game';
                    else if (status === 3) presence = 'In Studio';
                    else presence = 'Offline';
                    lastOnline = presenceData.userPresences[0].lastOnline || '';
                }
            } catch(e) { presence = 'Unknown'; }
            
            // Get account age
            const createdDate = new Date(profile.created);
            const now = new Date();
            const accountAgeYears = now.getFullYear() - createdDate.getFullYear();
            const accountAgeDays = Math.floor((now - createdDate) / (1000 * 60 * 60 * 24));
            const joinDate = createdDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            
            // Avatar image URL
            const avatarUrl = `https://www.roblox.com/headshot-thumbnail/image?userId=${userId}&width=420&height=420&format=png`;
            
            resultDiv.innerHTML = `
                <div style="text-align: center; margin-bottom: 20px;">
                    <img src="${avatarUrl}" class="avatar-img" style="width: 100px; height: 100px; border-radius: 50%;" onerror="this.src='https://www.roblox.com/favicon.ico'">
                </div>
                <div class="result-grid">
                    <div><strong>Username:</strong> ${profile.name}</div>
                    <div><strong>Display Name:</strong> ${profile.displayName || profile.name}</div>
                    <div><strong>User ID:</strong> ${profile.id}</div>
                    <div><strong>Join Date:</strong> ${joinDate}</div>
                    <div><strong>Account Age:</strong> ${accountAgeYears} years (${accountAgeDays} days)</div>
                    <div><strong>Followers:</strong> ${followers.toLocaleString()}</div>
                    <div><strong>Following:</strong> ${following.toLocaleString()}</div>
                    <div><strong>Friends:</strong> ${friends.toLocaleString()}</div>
                    <div><strong>Status:</strong> ${presence}</div>
                    <div><strong>Profile Link:</strong> <a href="https://www.roblox.com/user.aspx?id=${profile.id}" target="_blank" style="color:#44aaff;">open in Roblox →</a></div>
                </div>
                ${profile.description ? `<hr><div><strong>Bio:</strong> ${profile.description}</div>` : ''}
            `;
            
        } catch (error) {
            resultDiv.innerHTML = `<p class="error">lookup failed: ${error.message}</p>`;
        }
    }
    
    document.getElementById('lookupRobloxBtn').addEventListener('click', lookupRoblox);
    document.getElementById('robloxUsername').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') lookupRoblox();
    });
    
    // ============ OBFUSCATED PASSCODE ============
    function checkPasscode() {
        const input = document.getElementById('passcodeInput');
        const code = input.value.trim();
        
        const p1 = String.fromCharCode(102, 97, 99, 116, 111, 114);
        const p2 = String.fromCharCode(45);
        const p3 = String.fromCharCode(97, 99, 99, 101, 115, 115);
        const p4 = String.fromCharCode(49, 51, 50);
        
        const correctCode = p1 + p2 + p3 + p4;
        
        if (code === correctCode) {
            document.getElementById('gate').classList.add('hidden');
            document.getElementById('mainContent').style.display = 'block';
            checkBackend();
        } else {
            document.getElementById('gateError').textContent = 'incorrect';
            input.value = '';
            input.focus();
            setTimeout(() => {
                document.getElementById('gateError').textContent = '';
            }, 1500);
        }
    }
    
    // ============ BACKEND URL ============
    const BACKEND_URL = 'https://aud-email-backend-1.onrender.com';
    
    let isSending = false;
    let stopRequested = false;
    
    async function checkBackend() {
        const statusDiv = document.getElementById('backendStatus');
        try {
            const response = await fetch(`${BACKEND_URL}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ test: true })
            });
            statusDiv.innerHTML = '✅ backend connected';
            statusDiv.style.background = 'rgba(10,42,10,0.8)';
            addStatus('backend connected', 'success');
        } catch (error) {
            statusDiv.innerHTML = '❌ backend not reachable';
            statusDiv.style.background = 'rgba(42,10,10,0.8)';
            addStatus('backend connection failed', 'error');
        }
    }
    
    function addStatus(message, type = 'info') {
        const statusDiv = document.getElementById('status');
        const p = document.createElement('p');
        p.className = type;
        p.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
        statusDiv.appendChild(p);
        p.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        
        while (statusDiv.children.length > 100) {
            statusDiv.removeChild(statusDiv.firstChild);
        }
    }
    
    async function testBackend() {
        addStatus('testing backend...', 'info');
        try {
            const response = await fetch(`${BACKEND_URL}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ test: true })
            });
            
            const data = await response.json();
            
            if (data && data.success === true) {
                addStatus('✓ backend reachable', 'success');
            } else {
                addStatus(`✗ backend error: ${data?.error || 'unknown'}`, 'error');
            }
        } catch (error) {
            addStatus(`✗ backend unreachable: ${error.message}`, 'error');
        }
    }
    
    async function sendEmailViaBackend(to, subject, body, from) {
        try {
            const response = await fetch(`${BACKEND_URL}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    to: to,
                    subject: subject,
                    body: body,
                    from: from
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                return { success: true, id: data.id };
            } else {
                return { success: false, error: data.error };
            }
        } catch (error) {
            return { success: false, error: error.message };
        }
    }
    
    function getRandomVariation(variationsText, defaultValue) {
        if (!variationsText || !variationsText.trim()) {
            return defaultValue;
        }
        const lines = variationsText.split('\n').filter(line => line.trim().length > 0);
        if (lines.length === 0) {
            return defaultValue;
        }
        return lines[Math.floor(Math.random() * lines.length)];
    }
    
    async function startSending() {
        if (isSending) {
            addStatus('already sending. stop first.', 'error');
            return;
        }
        
        const fromEmail = document.getElementById('fromEmail').value.trim();
        const toEmail = document.getElementById('toEmail').value.trim();
        const mainSubject = document.getElementById('subject').value.trim();
        const mainBody = document.getElementById('body').value;
        const delay = parseFloat(document.getElementById('delay').value);
        const bulkMode = document.getElementById('bulkMode').value;
        const subjectVariations = document.getElementById('subjectVariations').value;
        const messageVariations = document.getElementById('messageVariations').value;
        
        let targets = [];
        
        if (bulkMode === 'single') {
            if (!toEmail) {
                addStatus('enter a target email', 'error');
                return;
            }
            targets = [toEmail];
        } else if (bulkMode === 'list') {
            const bulkText = document.getElementById('bulkTargets').value;
            targets = bulkText.split('\n').filter(e => e.trim() && e.includes('@'));
            if (targets.length === 0) {
                addStatus('enter at least one email in bulk list', 'error');
                return;
            }
            addStatus(`loaded ${targets.length} targets`, 'info');
        } else if (bulkMode === 'spam') {
            const spamCount = parseInt(document.getElementById('spamCount').value);
            if (!toEmail) {
                addStatus('enter a target email for spam mode', 'error');
                return;
            }
            for (let i = 0; i < spamCount; i++) {
                targets.push(toEmail);
            }
            addStatus(`spam mode: ${spamCount} emails to ${toEmail}`, 'info');
        }
        
        if (!mainSubject && !mainBody && !subjectVariations && !messageVariations) {
            addStatus('enter a subject and message', 'error');
            return;
        }
        
        isSending = true;
        stopRequested = false;
        document.getElementById('sendBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'inline-block';
        
        let successCount = 0;
        let failCount = 0;
        
        for (let i = 0; i < targets.length && !stopRequested; i++) {
            const target = targets[i];
            
            let currentSubject = mainSubject;
            let currentBody = mainBody;
            
            if (bulkMode === 'spam') {
                if (subjectVariations.trim()) {
                    currentSubject = getRandomVariation(subjectVariations, mainSubject);
                }
                if (messageVariations.trim()) {
                    currentBody = getRandomVariation(messageVariations, mainBody);
                }
            }
            
            addStatus(`sending ${i+1}/${targets.length} to ${target}...`, 'info');
            
            const result = await sendEmailViaBackend(target, currentSubject, currentBody, fromEmail);
            
            if (result.success) {
                successCount++;
                addStatus(`✓ sent ${i+1} to ${target}`, 'success');
            } else {
                failCount++;
                addStatus(`✗ failed ${i+1} to ${target}: ${result.error}`, 'error');
            }
            
            if (i < targets.length - 1 && !stopRequested) {
                await new Promise(resolve => setTimeout(resolve, delay * 1000));
            }
        }
        
        addStatus(`=== complete: ${successCount} sent, ${failCount} failed ===`, successCount > 0 ? 'success' : 'error');
        
        isSending = false;
        stopRequested = false;
        document.getElementById('sendBtn').style.display = 'inline-block';
        document.getElementById('stopBtn').style.display = 'none';
    }
    
    function stopSending() {
        if (isSending) {
            stopRequested = true;
            addStatus('stopping after current email...', 'info');
        }
    }
    
    function updateBulkMode() {
        const mode = document.getElementById('bulkMode').value;
        document.getElementById('bulkTargetsGroup').style.display = mode === 'list' ? 'block' : 'none';
        document.getElementById('spamCountGroup').style.display = mode === 'spam' ? 'block' : 'none';
        document.getElementById('variationsGroup').style.display = mode === 'spam' ? 'block' : 'none';
        
        if (mode !== 'single') {
            document.getElementById('toEmail').disabled = mode !== 'spam';
        } else {
            document.getElementById('toEmail').disabled = false;
        }
    }
    
    // ============ EVENT LISTENERS ============
    document.getElementById('unlockBtn').addEventListener('click', checkPasscode);
    document.getElementById('passcodeInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkPasscode();
    });
    
    document.getElementById('sendBtn').addEventListener('click', startSending);
    document.getElementById('stopBtn').addEventListener('click', stopSending);
    document.getElementById('testBackendBtn').addEventListener('click', testBackend);
    document.getElementById('bulkMode').addEventListener('change', updateBulkMode);
    
    // ============ INIT ============
    updateBulkMode();
    addStatus('ready.', 'info');
</script>
</body>
</html>
