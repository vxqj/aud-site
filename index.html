<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }

    #fluid { position: fixed; inset: 0; z-index: 0; }

    .vignette {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 20%, rgba(10,10,15,.55) 100%),
                  linear-gradient(to bottom, rgba(10,10,15,.5) 0%, transparent 25%, transparent 70%, rgba(10,10,15,.7) 100%);
    }

    .content {
      position: fixed; inset: 0; z-index: 2;
      display: flex; flex-direction: column;
      padding: clamp(1.5rem, 4vw, 2.5rem);
      font-family: Georgia, serif; color: #f0eef8;
      opacity: 0; transform: translateY(10px);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }
    .content.visible { opacity: 1; transform: translateY(0); }

    nav { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: .85rem; letter-spacing: .2em; text-transform: uppercase; }
    .logo span { color: #FF9FFC; margin-right: .4rem; }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a {
      font-size: .75rem; letter-spacing: .1em; text-transform: uppercase;
      color: rgba(240,238,248,.45); text-decoration: none;
      transition: color .3s;
    }
    .nav-links a:hover { color: #f0eef8; }

    main {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; max-width: 680px;
    }

    .eyebrow {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 2rem; font-size: .65rem;
      letter-spacing: .2em; text-transform: uppercase;
      color: #FF9FFC; opacity: .8;
    }
    .eyebrow::before {
      content: ''; display: block; width: 2.5rem;
      height: 1px; background: #FF9FFC;
    }

    h1 {
      font-size: clamp(3.5rem, 8vw, 6.5rem);
      font-weight: 300; line-height: .95;
      letter-spacing: -.02em; margin-bottom: 1.75rem;
    }
    h1 em {
      font-style: italic;
      color: transparent;
      -webkit-text-stroke: 1px rgba(240,238,248,.55);
      padding-left: 1.5rem;
      display: block;
    }

    p {
      font-size: clamp(.9rem, 1.5vw, 1.05rem);
      font-weight: 300; line-height: 1.7;
      color: rgba(240,238,248,.45); margin-bottom: 2.5rem;
    }

    .actions { display: flex; align-items: center; gap: 1.5rem; }
    .btn {
      font-size: .7rem; letter-spacing: .15em; text-transform: uppercase;
      padding: .85rem 2rem; cursor: pointer; border: none;
      background: #f0eef8; color: #0a0a0f;
      transition: background .3s, transform .2s;
    }
    .btn:hover { background: #FF9FFC; transform: translateY(-1px); }
    .btn-ghost {
      background: none; color: rgba(240,238,248,.45); padding: 0;
      transition: color .3s;
    }
    .btn-ghost:hover { background: none; transform: none; color: #f0eef8; }

    footer {
      display: flex; justify-content: space-between;
      font-size: .65rem; letter-spacing: .1em;
      color: rgba(240,238,248,.2); text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div id="fluid"></div>
  <div class="vignette"></div>

  <div class="content" id="content">
    <nav>
      <div class="logo"><span>◈</span> Ether</div>
      <div class="nav-links">
        <a href="#">Work</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </div>
    </nav>

    <main>
      <div class="eyebrow">Interactive Experience</div>
      <h1>
        Move your
        <em>cursor</em>
        to explore
      </h1>
      <p>A real-time fluid dynamics simulation.<br>Each gesture shapes the flow.</p>
      <div class="actions">
        <button class="btn">Begin</button>
        <button class="btn btn-ghost">Learn more ↓</button>
      </div>
    </main>

    <footer>
      <span>Move your cursor across the canvas</span>
      <span>WebGL · Three.js</span>
    </footer>
  </div>

  <script type="module">
    import * as THREE from 'three';

    const container = document.getElementById('fluid');

    function makePaletteTexture(stops) {
      const arr = stops.length === 1 ? [stops[0], stops[0]] : stops;
      const data = new Uint8Array(arr.length * 4);
      arr.forEach((hex, i) => {
        const c = new THREE.Color(hex);
        data[i*4]=Math.round(c.r*255); data[i*4+1]=Math.round(c.g*255);
        data[i*4+2]=Math.round(c.b*255); data[i*4+3]=255;
      });
      const tex = new THREE.DataTexture(data, arr.length, 1, THREE.RGBAFormat);
      tex.magFilter = tex.minFilter = THREE.LinearFilter;
      tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
      tex.generateMipmaps = false; tex.needsUpdate = true;
      return tex;
    }

    const COLORS = ['#5227FF','#9B6FFF','#FF9FFC','#B497CF','#1a0a3d'];
    const paletteTex = makePaletteTexture(COLORS);
    const bgVec4 = new THREE.Vector4(0,0,0,0);

    // --- renderer ---
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.autoClear = false;
    renderer.setClearColor(0x000000, 0);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    container.appendChild(renderer.domElement);
    Object.assign(renderer.domElement.style, { width:'100%', height:'100%', display:'block' });

    let W = container.clientWidth, H = container.clientHeight;
    renderer.setSize(W, H);

    // --- shaders ---
    const face_vert = `attribute vec3 position;uniform vec2 boundarySpace;varying vec2 uv;precision highp float;void main(){vec3 pos=position;vec2 scale=1.0-boundarySpace*2.0;pos.xy*=scale;uv=vec2(0.5)+pos.xy*0.5;gl_Position=vec4(pos,1.0);}`;
    const line_vert = `attribute vec3 position;uniform vec2 px;precision highp float;varying vec2 uv;void main(){vec3 pos=position;uv=0.5+pos.xy*0.5;vec2 n=sign(pos.xy);pos.xy=abs(pos.xy)-px;pos.xy*=n;gl_Position=vec4(pos,1.0);}`;
    const mouse_vert = `precision highp float;attribute vec3 position;attribute vec2 uv;uniform vec2 center;uniform vec2 scale;uniform vec2 px;varying vec2 vUv;void main(){vec2 pos=position.xy*scale*2.0*px+center;vUv=uv;gl_Position=vec4(pos,0.0,1.0);}`;
    const advection_frag = `precision highp float;uniform sampler2D velocity;uniform float dt;uniform bool isBFECC;uniform vec2 fboSize;uniform vec2 px;varying vec2 uv;void main(){vec2 ratio=max(fboSize.x,fboSize.y)/fboSize;if(!isBFECC){vec2 vel=texture2D(velocity,uv).xy;gl_FragColor=vec4(texture2D(velocity,uv-vel*dt*ratio).xy,0,0);}else{vec2 vel=texture2D(velocity,uv).xy;vec2 old=uv-vel*dt*ratio;vec2 v2=texture2D(velocity,old).xy;vec2 new2=old+v2*dt*ratio;vec2 err=new2-uv;vec2 c=uv-err/2.0;vec2 v3=texture2D(velocity,c).xy;gl_FragColor=vec4(texture2D(velocity,c-v3*dt*ratio).xy,0,0);}}`;
    const color_frag = `precision highp float;uniform sampler2D velocity;uniform sampler2D palette;uniform vec4 bgColor;varying vec2 uv;void main(){vec2 vel=texture2D(velocity,uv).xy;float l=clamp(length(vel),0.0,1.0);vec3 c=texture2D(palette,vec2(l,0.5)).rgb;gl_FragColor=vec4(mix(bgColor.rgb,c,l),mix(bgColor.a,1.0,l));}`;
    const divergence_frag = `precision highp float;uniform sampler2D velocity;uniform float dt;uniform vec2 px;varying vec2 uv;void main(){float x0=texture2D(velocity,uv-vec2(px.x,0)).x;float x1=texture2D(velocity,uv+vec2(px.x,0)).x;float y0=texture2D(velocity,uv-vec2(0,px.y)).y;float y1=texture2D(velocity,uv+vec2(0,px.y)).y;gl_FragColor=vec4((x1-x0+y1-y0)/2.0/dt);}`;
    const externalForce_frag = `precision highp float;uniform vec2 force;uniform vec2 center;uniform vec2 scale;uniform vec2 px;varying vec2 vUv;void main(){vec2 c=(vUv-0.5)*2.0;float d=1.0-min(length(c),1.0);d*=d;gl_FragColor=vec4(force*d,0,1);}`;
    const poisson_frag = `precision highp float;uniform sampler2D pressure;uniform sampler2D divergence;uniform vec2 px;varying vec2 uv;void main(){float p0=texture2D(pressure,uv+vec2(px.x*2,0)).r;float p1=texture2D(pressure,uv-vec2(px.x*2,0)).r;float p2=texture2D(pressure,uv+vec2(0,px.y*2)).r;float p3=texture2D(pressure,uv-vec2(0,px.y*2)).r;float div=texture2D(divergence,uv).r;gl_FragColor=vec4((p0+p1+p2+p3)/4.0-div);}`;
    const pressure_frag = `precision highp float;uniform sampler2D pressure;uniform sampler2D velocity;uniform vec2 px;uniform float dt;varying vec2 uv;void main(){float p0=texture2D(pressure,uv+vec2(px.x,0)).r;float p1=texture2D(pressure,uv-vec2(px.x,0)).r;float p2=texture2D(pressure,uv+vec2(0,px.y)).r;float p3=texture2D(pressure,uv-vec2(0,px.y)).r;vec2 v=texture2D(velocity,uv).xy;gl_FragColor=vec4(v-vec2(p0-p1,p2-p3)*0.5*dt,0,1);}`;
    const viscous_frag = `precision highp float;uniform sampler2D velocity;uniform sampler2D velocity_new;uniform float v;uniform vec2 px;uniform float dt;varying vec2 uv;void main(){vec2 old=texture2D(velocity,uv).xy;vec2 n0=texture2D(velocity_new,uv+vec2(px.x*2,0)).xy;vec2 n1=texture2D(velocity_new,uv-vec2(px.x*2,0)).xy;vec2 n2=texture2D(velocity_new,uv+vec2(0,px.y*2)).xy;vec2 n3=texture2D(velocity_new,uv-vec2(0,px.y*2)).xy;gl_FragColor=vec4((4.0*old+v*dt*(n0+n1+n2+n3))/(4.0*(1.0+v*dt)),0,0);}`;

    // --- FBO helpers ---
    const isIOS = /(iPad|iPhone|iPod)/i.test(navigator.userAgent);
    const floatType = isIOS ? THREE.HalfFloatType : THREE.FloatType;
    function mkFBO() {
      return new THREE.WebGLRenderTarget(
        Math.max(1,Math.round(0.5*W)), Math.max(1,Math.round(0.5*H)),
        { type: floatType, depthBuffer: false, stencilBuffer: false,
          minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
          wrapS: THREE.ClampToEdgeWrapping, wrapT: THREE.ClampToEdgeWrapping }
      );
    }

    let fw = Math.max(1,Math.round(0.5*W)), fh = Math.max(1,Math.round(0.5*H));
    const fbos = {};
    ['vel_0','vel_1','vel_v0','vel_v1','div','p0','p1'].forEach(k => fbos[k] = mkFBO());

    function cellScale() { return new THREE.Vector2(1/fw, 1/fh); }
    function fboSize()   { return new THREE.Vector2(fw, fh); }

    // --- shader pass ---
    function makePass(vert, frag, uniforms) {
      const scene = new THREE.Scene();
      const cam = new THREE.Camera();
      const mat = new THREE.RawShaderMaterial({ vertexShader: vert, fragmentShader: frag, uniforms });
      scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), mat));
      return { scene, cam, mat, uniforms };
    }
    function runPass(pass, target) {
      renderer.setRenderTarget(target || null);
      renderer.render(pass.scene, pass.cam);
      renderer.setRenderTarget(null);
    }

    const cs = cellScale(), fs = fboSize();

    const advPass = makePass(face_vert, advection_frag, {
      boundarySpace:{value:cs}, px:{value:cs}, fboSize:{value:fs},
      velocity:{value:fbos.vel_0.texture}, dt:{value:0.014}, isBFECC:{value:true}
    });
    // boundary lines
    const bGeo = new THREE.BufferGeometry();
    bGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([-1,-1,0,-1,1,0,-1,1,0,1,1,0,1,1,0,1,-1,0,1,-1,0,-1,-1,0]),3));
    const bLine = new THREE.LineSegments(bGeo, new THREE.RawShaderMaterial({ vertexShader: line_vert, fragmentShader: advection_frag, uniforms: advPass.uniforms }));
    bLine.visible = false;
    advPass.scene.add(bLine);

    const mouseScene = new THREE.Scene();
    const mouseCam = new THREE.Camera();
    const mouseMat = new THREE.RawShaderMaterial({
      vertexShader: mouse_vert, fragmentShader: externalForce_frag,
      blending: THREE.AdditiveBlending, depthWrite: false,
      uniforms: { px:{value:cs}, force:{value:new THREE.Vector2()}, center:{value:new THREE.Vector2()}, scale:{value:new THREE.Vector2(100,100)} }
    });
    mouseScene.add(new THREE.Mesh(new THREE.PlaneGeometry(1,1), mouseMat));

    const divPass = makePass(face_vert, divergence_frag, {
      boundarySpace:{value:cs}, velocity:{value:fbos.vel_1.texture}, px:{value:cs}, dt:{value:0.014}
    });
    const poissonPass = makePass(face_vert, poisson_frag, {
      boundarySpace:{value:cs}, pressure:{value:fbos.p0.texture}, divergence:{value:fbos.div.texture}, px:{value:cs}
    });
    const pressPass = makePass(face_vert, pressure_frag, {
      boundarySpace:{value:cs}, pressure:{value:fbos.p0.texture}, velocity:{value:fbos.vel_1.texture}, px:{value:cs}, dt:{value:0.014}
    });

    const outScene = new THREE.Scene();
    const outCam = new THREE.Camera();
    const outMat = new THREE.RawShaderMaterial({
      vertexShader: face_vert, fragmentShader: color_frag,
      transparent: true, depthWrite: false,
      uniforms: { velocity:{value:fbos.vel_0.texture}, boundarySpace:{value:new THREE.Vector2()}, palette:{value:paletteTex}, bgColor:{value:bgVec4} }
    });
    outScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), outMat));

    // --- mouse ---
    const coords = new THREE.Vector2();
    const coordsOld = new THREE.Vector2();
    const diff = new THREE.Vector2();
    let isInside = false;

    window.addEventListener('mousemove', e => {
      const r = container.getBoundingClientRect();
      isInside = e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom;
      if (!isInside) return;
      coords.set((e.clientX-r.left)/r.width*2-1, -((e.clientY-r.top)/r.height*2-1));
    });
    window.addEventListener('touchmove', e => {
      const t = e.touches[0], r = container.getBoundingClientRect();
      coords.set((t.clientX-r.left)/r.width*2-1, -((t.clientY-r.top)/r.height*2-1));
    }, { passive: true });

    // --- auto demo ---
    let autoTarget = new THREE.Vector2((Math.random()*2-1)*.8, (Math.random()*2-1)*.8);
    let autoCurrent = new THREE.Vector2();
    let lastInteract = 0;

    function pickTarget() { autoTarget.set((Math.random()*2-1)*.8,(Math.random()*2-1)*.8); }
    function updateAuto(now) {
      if (isInside || now - lastInteract < 2000) return;
      const dir = new THREE.Vector2().subVectors(autoTarget, autoCurrent);
      if (dir.length() < 0.02) { pickTarget(); return; }
      autoCurrent.addScaledVector(dir.normalize(), 0.004);
      coords.copy(autoCurrent);
    }
    window.addEventListener('mousemove', () => lastInteract = performance.now());

    // --- resize ---
    function resize() {
      W = container.clientWidth; H = container.clientHeight;
      renderer.setSize(W, H);
      fw = Math.max(1,Math.round(0.5*W)); fh = Math.max(1,Math.round(0.5*H));
      Object.values(fbos).forEach(f => f.setSize(fw, fh));
      const nc = new THREE.Vector2(1/fw,1/fh);
      [advPass,divPass,poissonPass,pressPass].forEach(p => {
        if(p.uniforms.px) p.uniforms.px.value = nc;
        if(p.uniforms.boundarySpace) p.uniforms.boundarySpace.value = nc;
      });
      mouseMat.uniforms.px.value = nc;
      advPass.uniforms.fboSize.value = new THREE.Vector2(fw,fh);
    }
    window.addEventListener('resize', resize);

    // --- clock ---
    const clock = new THREE.Clock(); clock.start();

    // --- loop ---
    function loop() {
      const now = performance.now();
      clock.getDelta();
      updateAuto(now);

      diff.subVectors(coords, coordsOld);
      coordsOld.copy(coords);

      const MOUSE_FORCE = 25, CURSOR_SIZE = 120;
      const nc = new THREE.Vector2(1/fw,1/fh);
      const csx = CURSOR_SIZE*nc.x, csy = CURSOR_SIZE*nc.y;
      mouseMat.uniforms.force.value.set((diff.x/2)*MOUSE_FORCE,(diff.y/2)*MOUSE_FORCE);
      mouseMat.uniforms.center.value.set(
        Math.min(Math.max(coords.x,-1+csx+nc.x*2),1-csx-nc.x*2),
        Math.min(Math.max(coords.y,-1+csy+nc.y*2),1-csy-nc.y*2)
      );
      mouseMat.uniforms.scale.value.set(CURSOR_SIZE,CURSOR_SIZE);

      // advect
      advPass.uniforms.velocity.value = fbos.vel_0.texture;
      runPass(advPass, fbos.vel_1);

      // external force
      renderer.setRenderTarget(fbos.vel_1);
      renderer.render(mouseScene, mouseCam);
      renderer.setRenderTarget(null);

      // divergence
      divPass.uniforms.velocity.value = fbos.vel_1.texture;
      runPass(divPass, fbos.div);

      // poisson
      let pIn = fbos.p0, pOut = fbos.p1;
      for (let i=0;i<32;i++) {
        poissonPass.uniforms.pressure.value = pIn.texture;
        runPass(poissonPass, pOut);
        [pIn,pOut] = [pOut,pIn];
      }

      // pressure projection
      pressPass.uniforms.velocity.value = fbos.vel_1.texture;
      pressPass.uniforms.pressure.value = pIn.texture;
      runPass(pressPass, fbos.vel_0);

      // render
      outMat.uniforms.velocity.value = fbos.vel_0.texture;
      renderer.setRenderTarget(null);
      renderer.render(outScene, outCam);

      requestAnimationFrame(loop);
    }

    setTimeout(() => { document.getElementById('content').classList.add('visible'); }, 100);
    loop();
  </script>
</body>
</html>
