<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>aud.lol</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  font-family: "Courier Prime", "Courier New", monospace;
  color: #fff;
}

#wordfield {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

#trail {
  position: fixed;
  inset: 0;
  z-index: 5;
  pointer-events: none;
}

#content {
  position: fixed;
  top: 36px;
  left: 40px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.site-name {
  font-size: 1.35rem;
  font-weight: 700;
  letter-spacing: -.5px;
  color: #fff;
  margin-bottom: 6px;
  line-height: 1;
  min-height: 1.35rem;
}
.site-name::after {
  content: "|";
  animation: blink .7s step-end infinite;
  margin-left: 1px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.username-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 18px;
}
.username {
  font-size: .78rem;
  color: rgba(255,255,255,.45);
  letter-spacing: .5px;
}
.crown-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.crown-wrap svg {
  width: 14px;
  height: 14px;
  color: #ffffff;
  cursor: default;
  transition: transform .15s;
}
.crown-wrap:hover svg { transform: scale(1.2); }
.crown-tooltip {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10,10,10,.95);
  border: 1px solid rgba(255,255,255,.2);
  color: #fff;
  font-size: .62rem;
  font-family: "Courier Prime", monospace;
  letter-spacing: 1.5px;
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s, transform .15s;
  transform: translateX(-50%) translateY(4px);
}
.crown-wrap:hover .crown-tooltip {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.meta-label {
  font-size: .78rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
}

.meta-line {
  font-size: .78rem;
  color: #fff;
  margin-bottom: 3px;
  line-height: 1.55;
}

.meta-line.dim {
  color: rgba(255,255,255,.55);
}

.spacer { height: 14px; }

.link-item {
  font-size: .78rem;
  color: rgba(255,255,255,.7);
  text-decoration: underline;
  text-underline-offset: 3px;
  display: block;
  margin-bottom: 4px;
  transition: color .15s;
}
.link-item:hover { color: #fff; }

#overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: opacity .6s ease;
}
#overlay.hide {
  opacity: 0;
  pointer-events: none;
}
#overlay-text {
  font-family: "Courier Prime", monospace;
  font-size: .85rem;
  color: rgba(255,255,255,.4);
  letter-spacing: 2px;
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: .4; }
  50%       { opacity: .9; }
}
</style>
</head>
<body>

<canvas id="wordfield"></canvas>
<canvas id="trail"></canvas>
<video id="bgvideo" loop muted playsinline style="display:none;position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;pointer-events:none;"></video>

<div id="overlay">
  <span id="overlay-text">click me</span>
</div>

<audio id="audio" loop></audio>

<div id="content">
  <div class="site-name" id="site-name"></div>
  <div class="username-row">
    <span class="username">netloop</span>
    <div class="crown-wrap">
      <svg viewBox="0 0 24 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <!-- 3-spike crown: left spike, centre spike, right spike, base -->
        <polygon points="2,18 4,8 9,13 12,2 15,13 20,8 22,18"/>
        <rect x="2" y="18" width="20" height="2" rx="1"/>
      </svg>
      <div class="crown-tooltip">owner</div>
    </div>
  </div>

  <div class="meta-label">last change: <span id="last-change-date">26 April 2026</span></div>
  <div class="spacer"></div>

  <div class="meta-line dim" id="line1">Python / GoLang</div>
  <div class="meta-line dim" id="line2">nothing here is important.</div>
  <div class="meta-line dim" id="line3">if you're reading this, you're early.</div>
  <div class="meta-line" id="discord-line">discord: <span id="discord-val">netloop (355869591278452746)</span></div>

  <div class="spacer"></div>

  <div id="links-container"></div>
</div>

<script>
/* ══════════════════════════
   CONFIG — edit here
══════════════════════════ */
const C = {

  /* ── site info ── */
  siteName:   "aud.lol",
  lastChange: "26 April 2026",

  /* ── bio lines ── */
  lines: [
    "Python / GoLang",
    "nothing here is important.",
    "if you're reading this, you're early.",
  ],

  /* ── discord ── set to "" to hide */
  discord: "netloop (355869591278452746)",

  /* ── links ── */
  links: [
    { label: "-> tiktok",  url: "https://tiktok.com/@meqe"      },
    { label: "-> discord", url: "https://discord.gg/ydjBdhSJm9" },
  ],

  /* ── background video ── direct mp4 URL, "" to use falling words instead */
  bgVideo: {
    url:     "https://files.catbox.moe/4ep3ya.mp4",        /* e.g. "https://files.catbox.moe/abc123.mp4" */
    opacity: 0.5,       /* 0.0 to 1.0 — dim the video so text is readable */
  },

  /* ── background falling words ── (ignored if bgVideo.url is set) ── */
  bgWords:   ["netloop", "net", "</>"],
  wordCount: 28,
  wordSpeed: [1.2, 2.8],
  wordSize:  [10, 32],
  wordSpin:  0.008,
  wordColor: "rgba(150,170,210,",

  /* ── music ── */
  music: {
    url:    "",
    volume: 0.4,
  },

  /* ── cursor trail ── */
  trailColor:  "255,255,255",  /* r,g,b */
  trailLength: 18,             /* how many dots in the trail */

};
/* ══════════════════════════ */

/* apply config */
document.getElementById("last-change-date").textContent = C.lastChange;
document.getElementById("discord-val").textContent = C.discord;

const linesEl = [
  document.getElementById("line1"),
  document.getElementById("line2"),
  document.getElementById("line3"),
];
C.lines.forEach((t, i) => { if (linesEl[i]) linesEl[i].textContent = t; });

C.links.forEach(lk => {
  const a = document.createElement("a");
  a.className = "link-item";
  a.href = lk.url;
  a.target = "_blank";
  a.rel = "noopener";
  a.textContent = lk.label;
  document.getElementById("links-container").appendChild(a);
});

/* ── typewriter ── */
const nameEl = document.getElementById("site-name");
const typeText = C.siteName;
let typeIndex = 0, deleting = false;

function typeStep() {
  if (!deleting) {
    nameEl.textContent = typeText.slice(0, ++typeIndex);
    if (typeIndex === typeText.length) { deleting = true; setTimeout(typeStep, 1800); }
    else setTimeout(typeStep, 100);
  } else {
    nameEl.textContent = typeText.slice(0, --typeIndex);
    if (typeIndex === 0) { deleting = false; setTimeout(typeStep, 400); }
    else setTimeout(typeStep, 60);
  }
}
setTimeout(typeStep, 500);

/* ── overlay + music ── */
const audio = document.getElementById("audio");
const overlay = document.getElementById("overlay");

if (C.music.url) {
  audio.src = C.music.url;
  audio.volume = C.music.volume;
}

overlay.addEventListener("click", () => {
  overlay.classList.add("hide");
  setTimeout(() => overlay.remove(), 700);
  if (C.music.url) audio.play();
});

/* ── falling words (with drag) ── */
const canvas = document.getElementById("wordfield");
const ctx    = canvas.getContext("2d");

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", () => { resize(); initWords(); });

const words = [];
function randWord() {
  return C.bgWords[Math.floor(Math.random() * C.bgWords.length)];
}

function makeWord(spawnAtTop) {
  const depth = Math.random();
  const size  = C.wordSize[0]  + depth * (C.wordSize[1]  - C.wordSize[0]);
  const speed = C.wordSpeed[0] + depth * (C.wordSpeed[1] - C.wordSpeed[0]);
  return {
    text:    randWord(),
    x:       Math.random() * canvas.width,
    y:       spawnAtTop ? -(size * 2 + Math.random() * 80) : Math.random() * canvas.height,
    size, speed, depth,
    rot:     (Math.random() - .5) * Math.PI * 2,
    rotSpeed:(Math.random() > .5 ? 1 : -1) * (0.002 + Math.random() * C.wordSpin),
    drift:   (Math.random() - .5) * 0.15,
    opacity: 0.03 + depth * 0.22,
  };
}

function initWords() {
  words.length = 0;
  for (let i = 0; i < C.wordCount; i++) words.push(makeWord(false));
}
initWords();

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const w of words) {
    ctx.save();
    ctx.translate(w.x, w.y);
    ctx.rotate(w.rot);
    ctx.font = `400 ${w.size}px "Courier Prime", "Courier New", monospace`;
    ctx.fillStyle = C.wordColor + w.opacity + ")";
    ctx.fillText(w.text, 0, 0);
    ctx.restore();
    w.y += w.speed; w.x += w.drift; w.rot += w.rotSpeed;
    if (w.y > canvas.height + w.size * 3) {
      Object.assign(w, makeWord(true));
      w.x = Math.random() * canvas.width;
    }
  }
  requestAnimationFrame(draw);
}
draw();

/* ── ghost cursor trail ── */
const trail = document.getElementById("trail");
const tCtx  = trail.getContext("2d");
trail.width  = window.innerWidth;
trail.height = window.innerHeight;
window.addEventListener("resize", () => {
  trail.width  = window.innerWidth;
  trail.height = window.innerHeight;
});

let mx = window.innerWidth  / 2;
let my = window.innerHeight / 2;
/* multiple ghost layers, each lagging more than the last */
const ghosts = [
  { x: mx, y: my, lag: 0.18, alpha: 0.25, scale: 0.95 },
  { x: mx, y: my, lag: 0.10, alpha: 0.15, scale: 0.90 },
  { x: mx, y: my, lag: 0.06, alpha: 0.08, scale: 0.85 },
];

window.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; });

function drawArrow(x, y, alpha, scale) {
  const s = scale;
  tCtx.save();
  tCtx.translate(x, y);
  tCtx.scale(s, s);
  tCtx.beginPath();
  /* standard OS arrow cursor shape */
  tCtx.moveTo(0, 0);
  tCtx.lineTo(0, 16);
  tCtx.lineTo(3.5, 12.5);
  tCtx.lineTo(6, 18);
  tCtx.lineTo(8, 17);
  tCtx.lineTo(5.5, 11.5);
  tCtx.lineTo(10, 11.5);
  tCtx.closePath();
  tCtx.fillStyle = `rgba(255,255,255,${alpha})`;
  tCtx.fill();
  tCtx.strokeStyle = `rgba(0,0,0,${alpha * 0.5})`;
  tCtx.lineWidth = 0.8;
  tCtx.stroke();
  tCtx.restore();
}

function drawTrail() {
  tCtx.clearRect(0, 0, trail.width, trail.height);

  for (const g of ghosts) {
    g.x += (mx - g.x) * g.lag;
    g.y += (my - g.y) * g.lag;
    drawArrow(g.x, g.y, g.alpha, g.scale);
  }

  requestAnimationFrame(drawTrail);
}
drawTrail();
</script>
</body>
</html>
