<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>bio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  font-family: "Figtree", sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0a0a0a;
  cursor: none;
  position: relative;
}

/* cursor */
#cursor {
  position: fixed;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #fff;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%,-50%);
  mix-blend-mode: difference;
  transition: width .12s, height .12s, opacity .12s;
}
#cursor.big { width: 24px; height: 24px; opacity: .5; }

/* background */
#bg {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
}
#bg-media {
  width: 100%; height: 100%;
  object-fit: cover; display: none;
}
#bg-overlay {
  position: absolute; inset: 0;
}

/* scene */
#scene {
  position: relative; z-index: 10;
  perspective: 1000px;
}

/* ── THE CARD — horizontal rectangle ── */
#card {
  width: min(680px, 94vw);
  background: rgba(8,8,8,.68);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 24px;
  backdrop-filter: blur(22px) saturate(160%);
  -webkit-backdrop-filter: blur(22px) saturate(160%);
  box-shadow:
    0 40px 100px rgba(0,0,0,.7),
    0 0 0 1px rgba(255,255,255,.04) inset;
  transform-style: preserve-3d;
  will-change: transform;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* shimmer top edge */
#card::before {
  content: "";
  position: absolute;
  top: 0; left: 8%; right: 8%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.45) 40%, rgba(255,255,255,.45) 60%, transparent);
  pointer-events: none;
}

/* ── top section: avatar left + info right ── */
.card-top {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 30px 30px 22px;
}

/* avatar */
.av-wrap {
  position: relative;
  width: 82px; height: 82px;
  flex-shrink: 0;
}
.av-ring {
  position: absolute; inset: -3px;
  border-radius: 50%;
  animation: spin 3.5s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.av-inner {
  position: absolute; inset: 3px;
  border-radius: 50%;
  background: #111;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.av-inner img { width: 100%; height: 100%; object-fit: cover; }
.av-init {
  font-size: 1.6rem; font-weight: 900;
  letter-spacing: -2px;
}
.av-badge {
  position: absolute; bottom: 0; right: 0;
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid #080808;
  display: flex; align-items: center; justify-content: center;
  z-index: 2;
}
.av-badge svg { width: 11px; height: 11px; }

/* info block */
.card-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-width: 0;
}
.name-row {
  display: flex; align-items: center; gap: 7px;
}
.pname {
  font-size: 1.5rem; font-weight: 900;
  color: #fff; letter-spacing: -.5px; line-height: 1;
  white-space: nowrap;
}
.inline-badges { display: flex; gap: 4px; }
.ibadge {
  width: 20px; height: 20px; border-radius: 50%;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.12);
  display: flex; align-items: center; justify-content: center;
}
.ibadge svg { width: 11px; height: 11px; }

.phandle {
  font-size: .76rem; font-weight: 500;
  color: rgba(255,255,255,.38);
  letter-spacing: 1.2px;
  font-family: "Courier New", monospace;
}
.pbio {
  font-size: .88rem;
  color: rgba(255,255,255,.58);
  line-height: 1.5;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── divider ── */
.card-sep {
  width: calc(100% - 60px);
  margin: 0 30px;
  height: 1px;
  background: rgba(255,255,255,.07);
  flex-shrink: 0;
}

/* ── icon row at bottom of card ── */
.card-icons {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 16px 26px 22px;
  flex-wrap: wrap;
}
.cicon {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  text-decoration: none;
  color: rgba(255,255,255,.5);
  position: relative;
  transition: color .18s, background .18s, transform .18s;
  cursor: none;
}
.cicon svg { width: 17px; height: 17px; }
.cicon:hover {
  color: #fff;
  background: rgba(255,255,255,.1);
  transform: translateY(-3px) scale(1.15);
}
/* tooltip */
.cicon::after {
  content: attr(data-t);
  position: absolute;
  bottom: calc(100% + 6px); left: 50%;
  transform: translateX(-50%) translateY(4px);
  background: rgba(0,0,0,.88);
  color: #fff;
  font-size: .65rem; font-weight: 600; letter-spacing: .5px;
  padding: 3px 8px; border-radius: 5px;
  white-space: nowrap;
  opacity: 0; pointer-events: none;
  transition: opacity .13s, transform .13s;
}
.cicon:hover::after { opacity: 1; transform: translateX(-50%) translateY(0); }

/* views badge */
#views {
  position: fixed; bottom: 22px; left: 18px;
  z-index: 100;
  background: rgba(8,8,8,.8);
  border: 1px solid rgba(255,255,255,.09);
  border-radius: 100px;
  padding: 6px 13px;
  backdrop-filter: blur(20px);
  font-size: .72rem; color: rgba(255,255,255,.4);
  display: flex; align-items: center; gap: 5px;
  letter-spacing: .5px;
}
#views svg { width: 12px; height: 12px; opacity: .45; }

/* entry animation */
@keyframes up {
  from { opacity:0; transform:translateY(18px) scale(.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
#scene { animation: up .55s cubic-bezier(.22,1,.36,1) both; }
#views { animation: up .55s .12s cubic-bezier(.22,1,.36,1) both; }
</style>
</head>

<div id="bg">

  const overlay = document.getElementById("bg-overlay");
  overlay.style.background = b.overlay || "rgba(0,0,0,.45)";
  if (b.blur && b.blur !== "0px") {
    overlay.style.backdropFilter = `blur(${b.blur})`;
    overlay.style.webkitBackdropFilter = `blur(${b.blur})`;
  }
  if (b.type === "color") {
    document.getElementById("bg").style.background = b.src;
  } else if (b.type === "image" || b.type === "gif") {
    const img = document.getElementById("bg-media");
    img.src = b.src; img.style.display = "block";
  } else if (b.type === "video") {
    const old = document.getElementById("bg-media");
    const vid = document.createElement("video");
    vid.autoplay = true; vid.loop = true; vid.muted = true; vid.playsInline = true;
    vid.src = b.src;
    vid.style.cssText = "width:100%;height:100%;object-fit:cover;display:block;";
    old.replaceWith(vid);
  }
}

/* ── build card ── */
function buildCard() {
  document.getElementById("card").style.background   = C.cardBg;
  document.getElementById("card").style.borderColor  = C.cardBorder;

  /* avatar */
  document.getElementById("av-ring").style.background =
    `conic-gradient(${C.accent}, ${C.accent2}, ${C.accent})`;
  const avInner = document.getElementById("av-inner");
  if (C.avatarUrl && C.avatarUrl.trim()) {
    avInner.innerHTML = `<img src="${C.avatarUrl}" alt="${C.name}"/>`;
  } else {
    avInner.innerHTML = `<span class="av-init" style="color:${C.accent}">${C.avatarInit}</span>`;
  }
  const avBadge = document.getElementById("av-badge");
  avBadge.style.background = C.accent;
  avBadge.innerHTML = BADGE_ICO.owner;

  /* name/handle/bio */
  document.getElementById("pname").textContent   = C.name;
  document.getElementById("phandle").textContent = C.handle;
  document.getElementById("pbio").textContent    = C.bio;

  /* inline badges */
  document.getElementById("ibadges").innerHTML = (C.badges || []).map(b =>
    `<span class="ibadge" title="${b.tip}" style="color:${C.accent}">${BADGE_ICO[b.type] || BADGE_ICO.star}</span>`
  ).join("");

  /* social icons row */
  const cur = document.getElementById("cursor");
  const iconsEl = document.getElementById("card-icons");
  iconsEl.innerHTML = C.links.map(lk => {
    const p = (lk.platform || "website").toLowerCase();
    return `<a class="cicon" href="${lk.url}" target="_blank" rel="noopener" data-t="${lk.label}" style="color:rgba(255,255,255,.5)">${ICO[p] || ICO.website}</a>`;
  }).join("");
  iconsEl.querySelectorAll(".cicon").forEach(a => {
    a.addEventListener("mouseenter", () => cur.classList.add("big"));
    a.addEventListener("mouseleave", () => cur.classList.remove("big"));
  });
}

/* ── cursor ── */
const curEl = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
  curEl.style.left = e.clientX + "px";
  curEl.style.top  = e.clientY + "px";
});

/* ── parallax ── */
function initParallax() {
  const card = document.getElementById("card");
  const s = C.parallax;
  let raf;
  document.addEventListener("mousemove", e => {
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(() => {
      const rx = -((e.clientY / window.innerHeight) - .5) * 18 * s;
      const ry =  ((e.clientX / window.innerWidth)  - .5) * 18 * s;
      card.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
    });
  });
  document.addEventListener("mouseleave", () => {
    card.style.transition = "transform .5s cubic-bezier(.22,1,.36,1)";
    card.style.transform  = "rotateX(0deg) rotateY(0deg)";
    setTimeout(() => card.style.transition = "", 520);
  });
  if (window.DeviceOrientationEvent) {
    window.addEventListener("deviceorientation", e => {
      if (!e.gamma) return;
      const rx = Math.max(-16, Math.min(16, (e.beta  || 0) * .22 * s));
      const ry = Math.max(-16, Math.min(16, (e.gamma || 0) * .22 * s));
      card.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
    });
  }
}

/* ── init ── */
applyBg();
buildCard();
document.getElementById("vc").textContent = C.views;
initParallax();
</script>
