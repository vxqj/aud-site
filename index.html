<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aud.lol | OSINT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; line-height: 1.5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .header { border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 40px; display: flex; justify-content: space-between; flex-wrap: wrap; }
        .logo { font-size: 28px; font-weight: bold; }
        .logo small { font-size: 12px; color: #888; }
        .tagline { color: #888; font-size: 12px; }
        .nav { border-bottom: 1px solid #333; margin-bottom: 30px; display: flex; gap: 0; }
        .nav-btn { background: none; border: none; color: #888; font-family: monospace; font-size: 14px; padding: 10px 20px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
        .nav-btn:hover { color: #fff; background: #111; }
        .nav-btn.active { color: #fff; border-bottom-color: #fff; }
        .panel { display: none; animation: fade 0.15s ease; }
        .panel.active { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        .input-group { margin: 20px 0; }
        label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 8px; }
        input { width: 100%; max-width: 500px; background: #0a0a0a; border: 1px solid #333; color: #fff; padding: 10px 12px; font-family: monospace; font-size: 14px; border-radius: 0px; }
        input:focus { outline: none; border-color: #fff; }
        button { background: #fff; border: none; color: #000; padding: 8px 20px; font-family: monospace; font-size: 12px; font-weight: bold; cursor: pointer; border-radius: 0px; margin-top: 10px; }
        button:hover { background: #ccc; }
        .result { margin-top: 30px; border: 1px solid #333; padding: 20px; background: #050505; font-size: 13px; overflow-x: auto; }
        .result h3 { font-size: 14px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; color: #aaa; }
        .error { color: #ff4444; }
        .flex { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
        .badge { background: #111; padding: 4px 8px; font-size: 10px; border: 1px solid #333; display: inline-block; margin-right: 8px; margin-bottom: 8px; }
        a { color: #fff; text-decoration: underline; }
        a:hover { color: #aaa; }
        .footer { margin-top: 60px; padding-top: 20px; border-top: 1px solid #222; font-size: 11px; color: #444; text-align: center; }
        hr { border: none; border-top: 1px solid #222; margin: 20px 0; }
        @media (max-width: 700px) { .container { padding: 20px; } .header { flex-direction: column; gap: 10px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">aud.lol<span style="color:#888;"><small> /// OSINT SUITE</small></span></div>
        <div class="tagline">discord · breaches · email · username · ip</div>
    </div>
    <div class="nav">
        <button class="nav-btn active" data-tab="discord">DISCORD</button>
        <button class="nav-btn" data-tab="breach">BREACHES</button>
        <button class="nav-btn" data-tab="email">EMAIL OSINT</button>
        <button class="nav-btn" data-tab="username">USERNAME</button>
        <button class="nav-btn" data-tab="ip">IP GEOLOCATION</button>
    </div>
    <div id="discord" class="panel active">
        <div class="input-group"><label>DISCORD USER ID</label><input type="text" id="discordId" placeholder="123456789012345678"><button id="discordBtn">LOOKUP</button></div>
        <div id="discordResult" class="result"></div>
    </div>
    <div id="breach" class="panel">
        <div class="input-group"><label>EMAIL ADDRESS</label><input type="email" id="breachEmail" placeholder="user@example.com"><button id="breachBtn">CHECK BREACHES</button></div>
        <div id="breachResult" class="result"></div>
    </div>
    <div id="email" class="panel">
        <div class="input-group"><label>EMAIL ADDRESS</label><input type="email" id="osintEmail" placeholder="target@example.com"><button id="emailBtn">FULL OSINT</button></div>
        <div id="emailResult" class="result"></div>
    </div>
    <div id="username" class="panel">
        <div class="input-group"><label>USERNAME</label><input type="text" id="usernameInput" placeholder="username"><button id="usernameBtn">SCAN PLATFORMS</button></div>
        <div id="usernameResult" class="result"></div>
    </div>
    <div id="ip" class="panel">
        <div class="input-group"><label>IP ADDRESS (IPv4)</label><input type="text" id="ipInput" placeholder="8.8.8.8"><button id="ipBtn">GEOLOCATE</button></div>
        <div id="ipResult" class="result"></div>
    </div>
    <div class="footer">aud.lol — osint tools · data from public sources · no warranty</div>
</div>
<script>
    const API_BASE = 'https://YOUR-BACKEND-URL.onrender.com/api'; // CHANGE THIS
    // Tab switching
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab).classList.add('active');
        });
    });
    async function callAPI(endpoint, resultId, renderFn) {
        const div = document.getElementById(resultId);
        div.innerHTML = '<div style="color:#888;">[ loading... ]</div>';
        try {
            const res = await fetch(`${API_BASE}${endpoint}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            renderFn(data, div);
        } catch(err) {
            div.innerHTML = `<div class="error">[ ERROR ] ${err.message}</div>`;
        }
    }
    function renderDiscord(data, div) {
        if (data.error) { div.innerHTML = `<div class="error">${data.error}</div>`; return; }
        div.innerHTML = `<h3>DISCORD USER</h3><div class="flex"><div><strong>ID</strong><br>${data.id || '?'}</div><div><strong>USERNAME</strong><br>${data.username || '?'}${data.discriminator ? '#'+data.discriminator : ''}</div><div><strong>CREATED</strong><br>${data.created_at || '?'}</div></div>${data.avatar_url ? `<hr><img src="${data.avatar_url}" style="max-width:80px; border:1px solid #333;">` : ''}`;
    }
    function renderBreach(data, div) {
        if (data.error) { div.innerHTML = `<div class="error">${data.error}</div>`; return; }
        if (!data.breaches || data.breaches.length === 0) { div.innerHTML = `<h3>NO KNOWN BREACHES</h3><div>This email appears in no public data breaches.</div>`; return; }
        let html = `<h3>${data.breaches.length} BREACH${data.breaches.length !== 1 ? 'ES' : ''} FOUND</h3>`;
        data.breaches.forEach(b => { html += `<div style="margin-bottom:16px; border-left:2px solid #333; padding-left:12px;"><strong>${b.Name || b.name || '?'}</strong> — ${b.BreachDate || b.breachDate || 'date unknown'}<br><span style="color:#aaa;">${(b.DataClasses || b.dataClasses || []).join(', ')}</span></div>`; });
        div.innerHTML = html;
    }
    function renderEmail(data, div) {
        if (data.error) { div.innerHTML = `<div class="error">${data.error}</div>`; return; }
        div.innerHTML = `<h3>EMAIL OSINT</h3><div><strong>EMAIL</strong> ${data.email}</div><div><strong>BREACH COUNT</strong> ${data.breach_count || 0}</div><div><strong>SOCIAL PROFILES</strong> ${data.socials?.length || 0}</div>`;
    }
    function renderUsername(data, div) {
        if (data.error) { div.innerHTML = `<div class="error">${data.error}</div>`; return; }
        const found = (data.profiles || []).filter(p => p.exists);
        div.innerHTML = `<h3>USERNAME: ${data.username || '?'}</h3><div><strong>FOUND ON ${found.length}/${data.total || 0} PLATFORMS</strong></div><div style="margin-top:16px;">${found.map(p => `<a href="${p.url}" target="_blank" class="badge">${p.name}</a>`).join('')}</div>`;
    }
    function renderIP(data, div) {
        if (data.error || data.status === 'fail') { div.innerHTML = `<div class="error">${data.message || 'Invalid IP'}</div>`; return; }
        div.innerHTML = `<h3>IP GEOLOCATION</h3><div class="flex"><div><strong>IP</strong><br>${data.ip || '?'}</div><div><strong>LOCATION</strong><br>${data.city || '?'}, ${data.regionName || '?'}, ${data.country || '?'}</div><div><strong>ISP</strong><br>${data.org || data.isp || '?'}</div><div><strong>COORDINATES</strong><br>${data.lat || '?'}, ${data.lon || '?'}</div><div><strong>TIMEZONE</strong><br>${data.timezone || '?'}</div></div>`;
    }
    document.getElementById('discordBtn').onclick = () => { const id = document.getElementById('discordId').value.trim(); if(id) callAPI(`/discord/${id}`, 'discordResult', renderDiscord); };
    document.getElementById('breachBtn').onclick = () => { const email = document.getElementById('breachEmail').value.trim(); if(email) callAPI(`/breach/${email}`, 'breachResult', renderBreach); };
    document.getElementById('emailBtn').onclick = () => { const email = document.getElementById('osintEmail').value.trim(); if(email) callAPI(`/email-osint/${email}`, 'emailResult', renderEmail); };
    document.getElementById('usernameBtn').onclick = () => { const user = document.getElementById('usernameInput').value.trim(); if(user) callAPI(`/username/${user}`, 'usernameResult', renderUsername); };
    document.getElementById('ipBtn').onclick = () => { const ip = document.getElementById('ipInput').value.trim(); if(ip) callAPI(`/ip/${ip}`, 'ipResult', renderIP); };
</script>
</body>
</html>
