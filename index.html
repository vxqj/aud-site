<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aud.lol | Email Delivery System</title>
    
    <!-- Discord Embed Meta Tags -->
    <meta property="og:title" content="aud.lol | Email Delivery System">
    <meta property="og:description" content="Educational email testing tool. Send bulk emails, spam mode, subject/message variations, and real-time delivery reports. For authorized use only.">
    <meta property="og:image" content="https://files.catbox.moe/3tt66w.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://aud.lol">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="aud.lol">
    <meta name="theme-color" content="#000000">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="aud.lol | Email Delivery System">
    <meta name="twitter:description" content="Educational email testing tool. Send bulk emails, spam mode, subject/message variations, and real-time delivery reports.">
    <meta name="twitter:image" content="https://files.catbox.moe/3tt66w.jpg">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
            height: 100vh;
            overflow: hidden;
            color: #fff;
            position: relative;
        }

        /* Canvas for particle animation */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
        }

        .gate, .main-content {
            position: relative;
            z-index: 1;
        }

        /* PASSCODE GATE - MINIMALISTIC */
        .gate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.4s ease;
        }

        .gate.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .gate-box {
            text-align: center;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 48px 64px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
        }

        .gate-box h2 {
            color: #fff;
            font-size: 28px;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 24px;
        }

        .gate-box input {
            width: 240px;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: #fff;
            padding: 12px 4px;
            font-size: 16px;
            text-align: center;
            font-family: monospace;
            letter-spacing: 2px;
        }

        .gate-box input:focus {
            outline: none;
            border-bottom-color: #fff;
        }

        .gate-box button {
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            padding: 8px 28px;
            font-size: 12px;
            font-weight: 400;
            cursor: pointer;
            margin-top: 32px;
            transition: all 0.2s;
            border-radius: 0px;
        }

        .gate-box button:hover {
            background: #fff;
            color: #000;
        }

        .gate-error {
            color: #ff4444;
            font-size: 11px;
            margin-top: 16px;
            letter-spacing: 1px;
        }

        /* MAIN CONTENT - SCROLLABLE */
        .main-content {
            display: none;
            height: 100vh;
            overflow-y: auto;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .header {
            margin-bottom: 40px;
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: 500;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .logo span {
            color: #555;
        }

        .sub {
            color: #666;
            font-size: 13px;
        }

        .card {
            background: rgba(5,5,5,0.85);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 24px;
        }

        .card h3 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-group input,
        .input-group textarea,
        .input-group select {
            width: 100%;
            background: rgba(10,10,10,0.9);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 12px 14px;
            font-size: 14px;
            font-family: inherit;
            border-radius: 10px;
        }

        .input-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .input-group input:focus,
        .input-group textarea:focus,
        .input-group select:focus {
            outline: none;
            border-color: #fff;
        }

        .row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .row .input-group {
            flex: 1;
        }

        button {
            background: #fff;
            border: none;
            color: #000;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 10px;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.85;
        }

        button.danger {
            background: #ff4444;
            color: #fff;
        }

        button.secondary {
            background: rgba(10,10,10,0.9);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .status {
            background: rgba(10,10,10,0.9);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
            font-family: monospace;
        }

        .status p {
            margin-bottom: 6px;
            color: #888;
        }

        .status .success {
            color: #44ff44;
        }

        .status .error {
            color: #ff4444;
        }

        .status .info {
            color: #44aaff;
        }

        .flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        hr {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.08);
            margin: 20px 0;
        }

        .warning {
            background: rgba(26,10,10,0.8);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(68,34,34,0.5);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            font-size: 12px;
            color: #ff8888;
        }

        .backend-status {
            background: rgba(10,42,10,0.8);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(42,74,42,0.5);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #88ff88;
            text-align: center;
        }

        /* Scrollbar styling */
        .main-content::-webkit-scrollbar {
            width: 6px;
        }

        .main-content::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        .main-content::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        .main-content::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>

<!-- CANVAS FOR BACKGROUND ANIMATION -->
<canvas id="bgCanvas"></canvas>

<!-- PASSCODE GATE -->
<div id="gate" class="gate">
    <div class="gate-box">
        <h2>aud.lol</h2>
        <input type="password" id="passcodeInput" placeholder="enter passcode" autofocus>
        <div>
            <button id="unlockBtn">unlock</button>
        </div>
        <div id="gateError" class="gate-error"></div>
    </div>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent" class="main-content">
<div class="container">
    <div class="header">
        <div class="logo">aud<span>.</span>lol</div>
        <div class="sub">email delivery system</div>
    </div>

    <div id="backendStatus" class="backend-status">
        🔌 checking backend...
    </div>

    <div class="warning">
        ⚠️ educational purpose only — test your own servers only.
    </div>

    <div class="card">
        <h3>send emails</h3>
        
        <div class="row">
            <div class="input-group">
                <label>from email</label>
                <input type="email" id="fromEmail" placeholder="noreply@aud.lol" value="noreply@aud.lol">
            </div>
            <div class="input-group">
                <label>to email</label>
                <input type="email" id="toEmail" placeholder="target@example.com">
            </div>
        </div>

        <div class="input-group">
            <label>subject</label>
            <input type="text" id="subject" placeholder="your subject here">
        </div>

        <div class="input-group">
            <label>message body</label>
            <textarea id="body" placeholder="enter your message here..."></textarea>
        </div>

        <div class="row">
            <div class="input-group">
                <label>delay (seconds)</label>
                <input type="number" id="delay" value="2" min="0.5" step="0.5">
            </div>
            <div class="input-group">
                <label>bulk mode</label>
                <select id="bulkMode">
                    <option value="single">single</option>
                    <option value="list">bulk list</option>
                    <option value="spam">spam mode</option>
                </select>
            </div>
        </div>

        <!-- MESSAGE VARIATIONS FOR SPAM MODE -->
        <div id="variationsGroup" style="display: none;">
            <div class="input-group">
                <label>subject variations (one per line)</label>
                <textarea id="subjectVariations" rows="3" placeholder="enter different subjects here...&#10;one per line"></textarea>
            </div>
            <div class="input-group">
                <label>message variations (one per line)</label>
                <textarea id="messageVariations" rows="4" placeholder="enter different messages here...&#10;one per line"></textarea>
            </div>
        </div>

        <div class="input-group" id="bulkTargetsGroup" style="display: none;">
            <label>bulk targets (one per line)</label>
            <textarea id="bulkTargets" rows="5" placeholder="target1@example.com&#10;target2@example.com"></textarea>
        </div>

        <div class="input-group" id="spamCountGroup" style="display: none;">
            <label>spam count</label>
            <input type="number" id="spamCount" value="10" min="1" max="1000">
        </div>

        <div class="flex">
            <div>
                <button id="sendBtn">▶ send</button>
                <button id="stopBtn" class="danger" style="display: none;">⏹ stop</button>
            </div>
            <div>
                <button id="testBackendBtn" class="secondary">🔌 test backend</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>status</h3>
        <div id="status" class="status">
            <p>ready.</p>
        </div>
    </div>
</div>
</div>

<script>
    // ============ CANVAS BACKGROUND ANIMATION ============
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    let particles = [];
    let particleCount = 80;
    
    class Particle {
        constructor() {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.3;
            this.speedY = (Math.random() - 0.5) * 0.3;
            this.opacity = Math.random() * 0.3 + 0.1;
        }
        
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            
            if (this.x < 0) this.x = width;
            if (this.x > width) this.x = 0;
            if (this.y < 0) this.y = height;
            if (this.y > height) this.y = 0;
        }
        
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
            ctx.fill();
        }
    }
    
    function initCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        
        particles = [];
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
    }
    
    function animateCanvas() {
        ctx.clearRect(0, 0, width, height);
        
        // Draw gradient background
        const gradient = ctx.createLinearGradient(0, 0, width, height);
        gradient.addColorStop(0, '#0a0a0a');
        gradient.addColorStop(0.5, '#050505');
        gradient.addColorStop(1, '#000000');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);
        
        // Draw connecting lines between nearby particles
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 120) {
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${0.05 * (1 - distance / 120)})`;
                    ctx.stroke();
                }
            }
        }
        
        // Draw and update particles
        for (let particle of particles) {
            particle.update();
            particle.draw();
        }
        
        requestAnimationFrame(animateCanvas);
    }
    
    window.addEventListener('resize', () => {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        particles = [];
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }
    });
    
    initCanvas();
    animateCanvas();
    
    // ============ OBFUSCATED PASSCODE ============
    function checkPasscode() {
        const input = document.getElementById('passcodeInput');
        const code = input.value.trim();
        
        // Obfuscated: "factor-access132"
        const p1 = String.fromCharCode(102, 97, 99, 116, 111, 114);
        const p2 = String.fromCharCode(45);
        const p3 = String.fromCharCode(97, 99, 99, 101, 115, 115);
        const p4 = String.fromCharCode(49, 51, 50);
        
        const correctCode = p1 + p2 + p3 + p4;
        
        if (code === correctCode) {
            document.getElementById('gate').classList.add('hidden');
            document.getElementById('mainContent').style.display = 'block';
            checkBackend();
        } else {
            document.getElementById('gateError').textContent = 'incorrect';
            input.value = '';
            input.focus();
            setTimeout(() => {
                document.getElementById('gateError').textContent = '';
            }, 1500);
        }
    }
    
    // ============ BACKEND URL ============
    const BACKEND_URL = 'https://aud-email-backend-1.onrender.com';
    
    let isSending = false;
    let stopRequested = false;
    
    async function checkBackend() {
        const statusDiv = document.getElementById('backendStatus');
        try {
            const response = await fetch(`${BACKEND_URL}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ test: true })
            });
            statusDiv.innerHTML = '✅ backend connected';
            statusDiv.style.background = 'rgba(10,42,10,0.8)';
            addStatus('backend connected', 'success');
        } catch (error) {
            statusDiv.innerHTML = '❌ backend not reachable';
            statusDiv.style.background = 'rgba(42,10,10,0.8)';
            addStatus('backend connection failed', 'error');
        }
    }
    
    function addStatus(message, type = 'info') {
        const statusDiv = document.getElementById('status');
        const p = document.createElement('p');
        p.className = type;
        p.innerHTML = `[${new Date().toLocaleTimeString()}] ${message}`;
        statusDiv.appendChild(p);
        p.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        
        while (statusDiv.children.length > 100) {
            statusDiv.removeChild(statusDiv.firstChild);
        }
    }
    
    async function testBackend() {
        addStatus('testing backend...', 'info');
        try {
            const response = await fetch(`${BACKEND_URL}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ test: true })
            });
            
            const data = await response.json();
            
            if (data && data.success === true) {
                addStatus('✓ backend reachable', 'success');
            } else {
                addStatus(`✗ backend error: ${data?.error || 'unknown'}`, 'error');
            }
        } catch (error) {
            addStatus(`✗ backend unreachable: ${error.message}`, 'error');
        }
    }
    
    async function sendEmailViaBackend(to, subject, body, from) {
        try {
            const response = await fetch(`${BACKEND_URL}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    to: to,
                    subject: subject,
                    body: body,
                    from: from
                })
            });
            
            const data = await response.json();
            
            if (data.success) {
                return { success: true, id: data.id };
            } else {
                return { success: false, error: data.error };
            }
        } catch (error) {
            return { success: false, error: error.message };
        }
    }
    
    function getRandomVariation(variationsText, defaultValue) {
        if (!variationsText || !variationsText.trim()) {
            return defaultValue;
        }
        const lines = variationsText.split('\n').filter(line => line.trim().length > 0);
        if (lines.length === 0) {
            return defaultValue;
        }
        return lines[Math.floor(Math.random() * lines.length)];
    }
    
    async function startSending() {
        if (isSending) {
            addStatus('already sending. stop first.', 'error');
            return;
        }
        
        const fromEmail = document.getElementById('fromEmail').value.trim();
        const toEmail = document.getElementById('toEmail').value.trim();
        const mainSubject = document.getElementById('subject').value.trim();
        const mainBody = document.getElementById('body').value;
        const delay = parseFloat(document.getElementById('delay').value);
        const bulkMode = document.getElementById('bulkMode').value;
        const subjectVariations = document.getElementById('subjectVariations').value;
        const messageVariations = document.getElementById('messageVariations').value;
        
        let targets = [];
        
        if (bulkMode === 'single') {
            if (!toEmail) {
                addStatus('enter a target email', 'error');
                return;
            }
            targets = [toEmail];
        } else if (bulkMode === 'list') {
            const bulkText = document.getElementById('bulkTargets').value;
            targets = bulkText.split('\n').filter(e => e.trim() && e.includes('@'));
            if (targets.length === 0) {
                addStatus('enter at least one email in bulk list', 'error');
                return;
            }
            addStatus(`loaded ${targets.length} targets`, 'info');
        } else if (bulkMode === 'spam') {
            const spamCount = parseInt(document.getElementById('spamCount').value);
            if (!toEmail) {
                addStatus('enter a target email for spam mode', 'error');
                return;
            }
            for (let i = 0; i < spamCount; i++) {
                targets.push(toEmail);
            }
            addStatus(`spam mode: ${spamCount} emails to ${toEmail}`, 'info');
        }
        
        if (!mainSubject && !mainBody && !subjectVariations && !messageVariations) {
            addStatus('enter a subject and message', 'error');
            return;
        }
        
        isSending = true;
        stopRequested = false;
        document.getElementById('sendBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'inline-block';
        
        let successCount = 0;
        let failCount = 0;
        
        for (let i = 0; i < targets.length && !stopRequested; i++) {
            const target = targets[i];
            
            let currentSubject = mainSubject;
            let currentBody = mainBody;
            
            if (bulkMode === 'spam') {
                if (subjectVariations.trim()) {
                    currentSubject = getRandomVariation(subjectVariations, mainSubject);
                }
                if (messageVariations.trim()) {
                    currentBody = getRandomVariation(messageVariations, mainBody);
                }
            }
            
            addStatus(`sending ${i+1}/${targets.length} to ${target}...`, 'info');
            
            const result = await sendEmailViaBackend(target, currentSubject, currentBody, fromEmail);
            
            if (result.success) {
                successCount++;
                addStatus(`✓ sent ${i+1} to ${target}`, 'success');
            } else {
                failCount++;
                addStatus(`✗ failed ${i+1} to ${target}: ${result.error}`, 'error');
            }
            
            if (i < targets.length - 1 && !stopRequested) {
                await new Promise(resolve => setTimeout(resolve, delay * 1000));
            }
        }
        
        addStatus(`=== complete: ${successCount} sent, ${failCount} failed ===`, successCount > 0 ? 'success' : 'error');
        
        isSending = false;
        stopRequested = false;
        document.getElementById('sendBtn').style.display = 'inline-block';
        document.getElementById('stopBtn').style.display = 'none';
    }
    
    function stopSending() {
        if (isSending) {
            stopRequested = true;
            addStatus('stopping after current email...', 'info');
        }
    }
    
    function updateBulkMode() {
        const mode = document.getElementById('bulkMode').value;
        document.getElementById('bulkTargetsGroup').style.display = mode === 'list' ? 'block' : 'none';
        document.getElementById('spamCountGroup').style.display = mode === 'spam' ? 'block' : 'none';
        document.getElementById('variationsGroup').style.display = mode === 'spam' ? 'block' : 'none';
        
        if (mode !== 'single') {
            document.getElementById('toEmail').disabled = mode !== 'spam';
        } else {
            document.getElementById('toEmail').disabled = false;
        }
    }
    
    // ============ EVENT LISTENERS ============
    document.getElementById('unlockBtn').addEventListener('click', checkPasscode);
    document.getElementById('passcodeInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkPasscode();
    });
    
    document.getElementById('sendBtn').addEventListener('click', startSending);
    document.getElementById('stopBtn').addEventListener('click', stopSending);
    document.getElementById('testBackendBtn').addEventListener('click', testBackend);
    document.getElementById('bulkMode').addEventListener('change', updateBulkMode);
    
    // ============ INIT ============
    updateBulkMode();
    addStatus('ready.', 'info');
</script>
</body>
</html>
